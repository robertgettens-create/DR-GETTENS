    // ─── Pace Calculator ──────────────────────────────────────────────────────────
    const CALC_DISTANCES = [
      { label:"5K", miles: 3.107 },
      { label:"10K", miles: 6.214 },
      { label:"Half Marathon", miles: 13.109 },
      { label:"Marathon", miles: 26.219 },
    ];

    function PaceCalculator() {
      const saved = (() => { try { return JSON.parse(localStorage.getItem("rc_pace_calc")||"{}"); } catch(e) { return {}; } })();
      const [hours, setHours] = useState(saved.hours ?? "1");
      const [mins, setMins] = useState(saved.mins ?? "45");
      const [secs, setSecs] = useState(saved.secs ?? "00");
      const [distIdx, setDistIdx] = useState(saved.distIdx ?? 2);
      function persist(h, m, s, d) { try { localStorage.setItem("rc_pace_calc", JSON.stringify({hours:h,mins:m,secs:s,distIdx:d})); } catch(e){} }

      const totalSecs = (parseInt(hours)||0)*3600 + (parseInt(mins)||0)*60 + (parseInt(secs)||0);
      const miles = CALC_DISTANCES[distIdx].miles;
      const secsPerMile = miles > 0 ? totalSecs / miles : 0;
      const paceMin = Math.floor(secsPerMile / 60);
      const paceSec = Math.round(secsPerMile % 60);
      const paceStr = secsPerMile > 0 ? `${paceMin}:${String(paceSec).padStart(2,"0")}/mi` : "—";

      return (
        <div className="card" style={{marginBottom:12}}>
          <div className="card-title">Pace Calculator</div>
          <div style={{fontSize:12,color:"#5a6080",marginBottom:10}}>Enter a goal finish time to find your required pace per mile.</div>
          <div style={{display:"flex",gap:6,marginBottom:10,alignItems:"flex-end"}}>
            <div style={{flex:1}}>
              <div className="label">Hours</div>
              <input className="input" type="number" min="0" max="9" value={hours} onChange={e=>{setHours(e.target.value);persist(e.target.value,mins,secs,distIdx);}} style={{textAlign:"center"}} />
            </div>
            <div style={{flex:1}}>
              <div className="label">Minutes</div>
              <input className="input" type="number" min="0" max="59" value={mins} onChange={e=>{setMins(e.target.value);persist(hours,e.target.value,secs,distIdx);}} style={{textAlign:"center"}} />
            </div>
            <div style={{flex:1}}>
              <div className="label">Seconds</div>
              <input className="input" type="number" min="0" max="59" value={secs} onChange={e=>{setSecs(e.target.value);persist(hours,mins,e.target.value,distIdx);}} style={{textAlign:"center"}} />
            </div>
          </div>
          <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
            {CALC_DISTANCES.map((d,i)=>(
              <button key={d.label} onClick={()=>{setDistIdx(i);persist(hours,mins,secs,i);}} style={{
                background:distIdx===i?"#f07030":"#1e2030", color:distIdx===i?"white":"#a0a8c0",
                border:"none",borderRadius:20,padding:"4px 12px",fontSize:12,cursor:"pointer",fontWeight:distIdx===i?700:400
              }}>{d.label}</button>
            ))}
          </div>
          <div style={{background:"#1a1d2a",borderRadius:12,padding:"14px 16px",textAlign:"center"}}>
            <div style={{fontSize:11,color:"#5a6080",marginBottom:4}}>REQUIRED PACE</div>
            <div style={{fontSize:32,fontWeight:700,color:"#f07030"}}>{paceStr}</div>
            <div style={{fontSize:12,color:"#5a6080",marginTop:4}}>to finish {CALC_DISTANCES[distIdx].label} in {hours||"0"}:{String(mins||"0").padStart(2,"0")}:{String(secs||"0").padStart(2,"0")}</div>
          </div>
        </div>
      );
    }

    // ─── Coach Tab ────────────────────────────────────────────────────────────────
    const COACH_MSG_LIMIT = 20;
    function CoachTab({ fitbitStats, apiKey, races, onAddRace, onDeleteRace, savedMessages, onSaveMessages }) {
      const fbIntro = fitbitStats ? ` I can see your Fitbit data: ${fitbitStats.runCount} runs in the last 30 days, ${fitbitStats.totalMiles.toFixed(1)} miles, most recent pace ${fitbitStats.avgPace || "unknown"}.` : " Connect Fitbit in Settings for even more personalized advice.";
      const defaultMsg = { role: "assistant", content: `Hi! I'm your personal running coach. You're 54 years old, targeting the Mother's Day Half Marathon in ${WEEKS_LEFT} weeks, and you finished the Holyoke 10K.${fbIntro} What questions do you have?` };
      const [messages, setMessages] = useState(savedMessages?.length ? savedMessages : [defaultMsg]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const endRef = useRef(null);

      async function send(msg) {
        const text = msg || input.trim();
        if (!text || loading) return;
        const newMessages = [...messages, { role: "user", content: text }];
        setMessages(newMessages);
        setInput("");
        setLoading(true);
        const reply = await callClaude(newMessages, apiKey, fitbitStats, races, null);
        const finalMessages = [...newMessages, { role: "assistant", content: reply }];
        // Keep last COACH_MSG_LIMIT messages (always keep first greeting)
        const trimmed = finalMessages.length > COACH_MSG_LIMIT
          ? [finalMessages[0], ...finalMessages.slice(-(COACH_MSG_LIMIT - 1))]
          : finalMessages;
        setMessages(trimmed);
        onSaveMessages(trimmed);
        setLoading(false);
        setTimeout(() => endRef.current?.scrollIntoView({ behavior: "smooth" }), 100);
      }

      function clearChat() {
        const fresh = [defaultMsg];
        setMessages(fresh);
        onSaveMessages(fresh);
      }

      const suggestions = ["Am I ready for the half marathon?","What should I do this week?","How should I handle cold rainy weather?","I'm traveling for work — what do I do?","My knees are feeling sore","What pace should I run the half marathon at?","Does gardening count as cross-training?","How do I use my Fitbit heart rate zones?"];
      const hasHistory = messages.length > 1;
      return (
        <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 130px)"}}>
          <div style={{flex:1,overflowY:"auto"}}>
            <div className="chat-messages">
              {hasHistory && (
                <div style={{textAlign:"center",padding:"6px 0 2px"}}>
                  <span style={{fontSize:11,color:"#3a5a3a",background:"#0a2a1a",border:"1px solid #1a4a2a",borderRadius:10,padding:"2px 10px"}}>💬 Conversation continues from last session</span>
                </div>
              )}
              {messages.map((m,i) => (
                <div key={i} className={`msg msg-${m.role==="user"?"user":"ai"}`} style={{alignSelf:m.role==="user"?"flex-end":"flex-start"}}>
                  <span style={{whiteSpace:"pre-wrap",lineHeight:1.6}}>{m.content}</span>
                </div>
              ))}
              {loading && <div className="msg msg-ai" style={{alignSelf:"flex-start"}}><span style={{color:"#5a6080"}}>Thinking... </span><span className="spinner" style={{width:14,height:14,display:"inline-block",verticalAlign:"middle"}} /></div>}
              <div ref={endRef} />
            </div>
            <div style={{padding:"0 16px 16px"}}>
              <RaceHistory races={races} onAddRace={onAddRace} onDeleteRace={onDeleteRace} />
              <PaceCalculator />
              {!hasHistory && (
                <>
                  <div style={{fontSize:11,color:"#5a6080",marginBottom:8,letterSpacing:0.5}}>SUGGESTED QUESTIONS</div>
                  <div style={{display:"flex",flexWrap:"wrap"}}>{suggestions.map(q=><span key={q} className="suggested-pill" onClick={()=>send(q)}>{q}</span>)}</div>
                </>
              )}
              {hasHistory && (
                <div style={{textAlign:"center",marginTop:8}}>
                  <button onClick={clearChat} style={{background:"none",border:"1px solid #2a2d3e",borderRadius:8,color:"#5a6080",fontSize:12,padding:"5px 14px",cursor:"pointer"}}>Clear chat history</button>
                </div>
              )}
            </div>
          </div>
          <div className="chat-input-row">
            <input className="chat-input" placeholder="Ask your coach anything..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} />
            <button className="send-btn" onClick={()=>send()} disabled={!input.trim()||loading}>↑</button>
          </div>
        </div>
      );
    }

    // ─── Settings Tab ─────────────────────────────────────────────────────────────
    function SettingsTab({ settings, onSaveSettings, fitbitToken, fitbitStats, onFitbitConnect, onFitbitDisconnect, onFitbitSync, onClearAndResync, syncing, workouts, onImportWorkouts, redirectUri, weatherLocation, setWeatherLocation, setWeather }) {
      const [apiKey, setApiKey] = useState(settings.apiKey || "");
      const [fitbitClientId, setFitbitClientId] = useState(settings.fitbitClientId || "");
      const [showKey, setShowKey] = useState(false);
      const [status, setStatus] = useState(null);
      useEffect(() => {
        setApiKey(settings.apiKey || "");
        setFitbitClientId(settings.fitbitClientId || "");
      }, [settings.apiKey, settings.fitbitClientId]);
      const fileRef = useRef(null);
      const importFileRef = useRef(null);
      function showMsg(type, msg) { setStatus({ type, msg }); setTimeout(() => setStatus(null), 4000); }

      const DATA_KEYS = ["rc_workouts","rc_shoes","rc_plan","rc_week_notes","rc_settings","rc_races","rc_feeling","rc_coach_messages","rc_pace_calc","rc_weather_location"];

      async function exportData() {
        const out = {};
        for (const k of DATA_KEYS) {
          const v = await sget(k);
          if (v !== null) out[k] = v;
        }
        const json = JSON.stringify(out, null, 2);
        const blob = new Blob([json], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = `strideai-backup-${new Date().toISOString().split("T")[0]}.json`;
        a.click(); URL.revokeObjectURL(url);
        showMsg("success", "Data exported! Save the file somewhere safe.");
      }

      function handleDataImport(e) {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async ev => {
          try {
            const data = JSON.parse(ev.target.result);
            let count = 0;
            for (const k of DATA_KEYS) {
              if (data[k] !== undefined) { await sset(k, data[k]); count++; }
            }
            showMsg("success", `Imported ${count} data keys. Reload the page to see your data.`);
          } catch(err) { showMsg("warn", `Import failed: ${err.message}`); }
        };
        reader.readAsText(file);
        e.target.value = "";
      }
      function saveApiKey() { onSaveSettings({ ...settings, apiKey, fitbitClientId }); showMsg("success", "Settings saved!"); }
      function handleFileImport(e) {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            const imported = parseRunkeeperCSV(ev.target.result);
            if (imported.length === 0) { showMsg("warn", "No activities found. Make sure you're uploading cardioActivities.csv from your Runkeeper export ZIP."); return; }
            const existingIds = new Set(workouts.map(w => `${w.date}_${w.type}`));
            const fresh = imported.filter(a => !existingIds.has(`${a.date}_${a.type}`));
            onImportWorkouts(fresh);
            showMsg("success", `Imported ${fresh.length} new activities (${imported.length - fresh.length} duplicates skipped).`);
          } catch (err) { showMsg("warn", `Import error: ${err.message}`); }
        };
        reader.readAsText(file);
        e.target.value = "";
      }
      return (
        <div className="section">
          <div className="section-title" style={{marginBottom:16}}>Settings</div>
          {status && <div className={`alert alert-${status.type==="success"?"success":"warn"}`}>{status.msg}</div>}
          <div className="card">
            <div className="card-title">AI Coach — Anthropic API Key</div>
            <div style={{fontSize:13,color:"#5a6080",marginBottom:10,lineHeight:1.5}}>Get your free API key at <strong style={{color:"#a0a8c0"}}>console.anthropic.com</strong>. Stored only on this device.</div>
            <div style={{display:"flex",gap:8}}>
              <input className="input" style={{flex:1,marginBottom:0}} type={showKey?"text":"password"} placeholder="sk-ant-..." value={apiKey} onChange={e=>setApiKey(e.target.value)} />
              <button className="btn btn-secondary btn-sm" onClick={()=>setShowKey(v=>!v)}>{showKey?"Hide":"Show"}</button>
            </div>
            <button className="btn btn-primary" style={{marginTop:10}} onClick={saveApiKey}>Save API Key</button>
          </div>
          <div className="card">
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <div className="card-title" style={{marginBottom:0}}>Fitbit Integration</div>
              {fitbitToken && <span className="connected-badge">✓ Connected</span>}
            </div>
            {!fitbitToken ? (
              <>
                <div className="alert alert-info" style={{marginBottom:12}}>
                  <strong>One-time setup:</strong> Go to <strong>dev.fitbit.com → Manage → Register an App</strong>. Set type to <strong>Personal</strong>, OAuth 2.0 Application Type to <strong>Personal</strong>. Set Redirect URL to exactly:<br/>
                  <span style={{color:"#f0ede8",fontSize:11,wordBreak:"break-all",display:"block",marginTop:4,background:"#0a1020",padding:"4px 8px",borderRadius:6}}>{redirectUri}</span>
                  <span style={{display:"block",marginTop:6,fontSize:11,color:"#a0a8c0"}}>After connecting, you'll be sent to Fitbit to authorize, then redirected back automatically.</span>
                </div>
                <div className="label">Fitbit Client ID</div>
                <input className="input" placeholder="e.g. 23ABCD" value={fitbitClientId} onChange={e=>setFitbitClientId(e.target.value)} />
                <button className="btn btn-fitbit" onClick={()=>{onSaveSettings({...settings,apiKey,fitbitClientId});onFitbitConnect(fitbitClientId);}} disabled={!fitbitClientId.trim()}>Connect Fitbit →</button>
              </>
            ) : (
              <>
                {fitbitStats && (
                  <div style={{marginBottom:12}}>
                    {[["Last 30d runs",fitbitStats.runCount],["Total miles",`${fitbitStats.totalMiles.toFixed(1)} mi`],["Recent pace",fitbitStats.avgPace||"N/A"],["Avg resting HR",fitbitStats.restingHR!=null?`${fitbitStats.restingHR} bpm`:"N/A"],["Avg run HR",fitbitStats.avgRunHR!=null?`${fitbitStats.avgRunHR} bpm`:"N/A"],["Longest recent run",fitbitStats.longestRun>0?`${fitbitStats.longestRun.toFixed(1)} mi`:"N/A"]].map(([k,v]) => (
                      <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #1e2030",fontSize:13}}>
                        <span style={{color:"#5a6080"}}>{k}</span><span style={{color:"#c0c8e0"}}>{v}</span>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <button className="btn btn-fitbit btn-sm" onClick={onFitbitSync} disabled={syncing}>{syncing?"Syncing...":"Sync Now"}</button>
                  <button className="btn btn-secondary btn-sm" onClick={onClearAndResync} disabled={syncing} style={{color:"#f09050",borderColor:"#5a3010"}}>↺ Clear & Re-sync</button>
                  <button className="btn btn-danger btn-sm" onClick={onFitbitDisconnect}>Disconnect</button>
                </div>
              </>
            )}
          </div>
          <div className="card">
            <div className="card-title">Runkeeper — Import Past Data</div>
            <div className="tip-card" style={{marginBottom:12}}>Runkeeper's developer API is no longer available to new apps. To import your history: open Runkeeper → <strong>More → Export Data</strong>. You'll get a ZIP — upload the <strong>cardioActivities.csv</strong> file below.</div>
            <input ref={fileRef} type="file" accept=".csv,.txt" style={{display:"none"}} onChange={handleFileImport} />
            <button className="btn btn-secondary" onClick={()=>fileRef.current?.click()}>📁 Import cardioActivities.csv</button>
            {workouts.filter(w=>w.source==="runkeeper").length>0 && <div style={{fontSize:12,color:"#40c070",marginTop:8}}>✓ {workouts.filter(w=>w.source==="runkeeper").length} Runkeeper activities imported</div>}
          </div>
          <div className="card">
            <div className="card-title">Weather Location</div>
            <div style={{fontSize:12,color:"#5a6080",marginBottom:10}}>Choose which location to pull the 7-day forecast for.</div>
            {PRESET_LOCATIONS.map(loc => (
              <button key={loc.id} onClick={async()=>{ setWeatherLocation(loc); await sset("rc_weather_location",loc); fetchWeather(loc.lat,loc.lon,loc.tz).then(wx=>{if(wx)setWeather(wx);}); }} style={{
                display:"block", width:"100%", textAlign:"left", padding:"10px 12px", marginBottom:6,
                background: weatherLocation?.id===loc.id ? "#1a2a1a" : "#1a1d2a",
                border: weatherLocation?.id===loc.id ? "1px solid #3a7a3a" : "1px solid #2a2d3e",
                borderRadius:10, color: weatherLocation?.id===loc.id ? "#60c070" : "#c0c8e0",
                fontSize:14, cursor:"pointer", fontWeight: weatherLocation?.id===loc.id ? 600 : 400
              }}>
                {weatherLocation?.id===loc.id ? "✓ " : ""}{loc.name}
              </button>
            ))}
            <button onClick={()=>{
              if (!navigator.geolocation) { alert("GPS not available on this device."); return; }
              navigator.geolocation.getCurrentPosition(async pos => {
                const loc = { id:"gps", name:"Current Location (GPS)", lat: pos.coords.latitude, lon: pos.coords.longitude, tz: Intl.DateTimeFormat().resolvedOptions().timeZone };
                setWeatherLocation(loc); await sset("rc_weather_location", loc);
                fetchWeather(loc.lat, loc.lon, loc.tz).then(wx=>{if(wx)setWeather(wx);});
              }, ()=>alert("Could not get your location. Check browser permissions."));
            }} style={{display:"block",width:"100%",textAlign:"left",padding:"10px 12px",background:"#1a1d2a",border:"1px solid #2a2d3e",borderRadius:10,color:"#a0a8c0",fontSize:14,cursor:"pointer"}}>
              📍 Use My Current Location (GPS)
            </button>
          </div>
          <div className="card">
            <div className="card-title">Backup &amp; Restore Data</div>
            <div style={{fontSize:13,color:"#5a6080",marginBottom:12,lineHeight:1.6}}>
              Export your data to a file — then import it on any device or after adding to Home Screen. Saves workouts, plan, shoes, settings, and more. Does <strong style={{color:"#a0a8c0"}}>not</strong> include Fitbit tokens (re-connect Fitbit on the new device).
            </div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <button className="btn btn-primary btn-sm" onClick={exportData}>⬇ Export Data</button>
              <button className="btn btn-secondary btn-sm" onClick={()=>importFileRef.current?.click()}>⬆ Import Data</button>
            </div>
            <input ref={importFileRef} type="file" accept=".json" style={{display:"none"}} onChange={handleDataImport} />
          </div>
          <div className="card">
            <div className="card-title">Your Heart Rate Zones</div>
            <div style={{fontSize:12,color:"#5a6080",marginBottom:10}}>Karvonen formula · Max HR ~166 bpm</div>
            {[{name:"Zone 1 · Very Easy",range:"< 116 bpm",color:"#3b8a3a"},{name:"Zone 2 · Easy (target)",range:"116–133 bpm",color:"#60c040",bold:true},{name:"Zone 3 · Moderate",range:"134–142 bpm",color:"#c0a020"},{name:"Zone 4 · Hard",range:"143–157 bpm",color:"#c05010"},{name:"Zone 5 · Max",range:"158+ bpm",color:"#c02020"}].map(z => (
              <div key={z.name} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #1e2030",fontSize:12}}>
                <span style={{color:z.bold?"#60c040":"#a0a8c0",fontWeight:z.bold?700:400}}>{z.name}</span>
                <span style={{color:z.color,fontWeight:600}}>{z.range}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── Add Workout Modal ────────────────────────────────────────────────────────
    function AddWorkoutModal({ onAdd, onClose, shoes }) {
      const [type, setType] = useState("Run");
      const [date, setDate] = useState(TODAY.toISOString().split("T")[0]);
      const [distance, setDistance] = useState("");
      const [duration, setDuration] = useState("");
      const [effort, setEffort] = useState(null);
      const [notes, setNotes] = useState("");
      const [shoeId, setShoeId] = useState("");
      const runShoes = (shoes || []).filter(s => s.active !== false);
      return (
        <div className="modal-overlay" onClick={e=>e.target.className==="modal-overlay"&&onClose()}>
          <div className="modal">
            <div className="modal-title">Log Activity</div>
            <div className="label">Activity type</div>
            <select className="input" value={type} onChange={e=>setType(e.target.value)}>{Object.keys(WORKOUT_ICONS).map(t=><option key={t}>{t}</option>)}</select>
            <div className="label">Date</div>
            <input className="input" type="date" value={date} onChange={e=>setDate(e.target.value)} />
            {(type==="Run"||type==="Walk"||type==="Bike")&&<><div className="label">Distance (miles)</div><input className="input" type="number" step="0.1" placeholder="e.g. 4.5" value={distance} onChange={e=>setDistance(e.target.value)} /></>}
            {type==="Run" && runShoes.length > 0 && (
              <>
                <div className="label">Shoe — auto-tracks mileage (optional)</div>
                <select className="input" value={shoeId} onChange={e=>setShoeId(e.target.value)}>
                  <option value="">No shoe selected</option>
                  {runShoes.map(s=><option key={s.id} value={s.id}>{s.name} ({s.miles.toFixed(1)} mi)</option>)}
                </select>
              </>
            )}
            <div className="label">Duration (minutes)</div>
            <input className="input" type="number" placeholder="e.g. 45" value={duration} onChange={e=>setDuration(e.target.value)} />
            <div className="label">Effort (optional)</div>
            <div style={{display:"flex",gap:6,marginBottom:10}}>
              {[1,2,3,4,5].map(n => {
                const colors = {1:"#40c070",2:"#80c040",3:"#c0a020",4:"#c05010",5:"#c02020"};
                const labels = {1:"Easy",2:"Moderate",3:"Hard",4:"Very Hard",5:"Max"};
                return (
                  <button key={n} onClick={()=>setEffort(effort===n?null:n)} style={{
                    flex:1, background:effort===n?colors[n]+"33":"#1a1d2a",
                    border:`1px solid ${effort===n?colors[n]:"#2a2d3e"}`, borderRadius:10,
                    padding:"8px 2px", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:2
                  }}>
                    <span style={{fontSize:16,fontWeight:700,color:effort===n?colors[n]:"#5a6080"}}>{n}</span>
                    <span style={{fontSize:9,color:effort===n?colors[n]:"#5a6080"}}>{labels[n]}</span>
                  </button>
                );
              })}
            </div>
            <div className="label">Notes (optional)</div>
            <input className="input" placeholder="How'd it feel? Weather? Route?" value={notes} onChange={e=>setNotes(e.target.value)} />
            <button className="btn btn-primary" onClick={()=>{onAdd({id:Date.now(),type,date,distance:distance?parseFloat(distance):"",duration,effort,notes,shoeId:shoeId||null});onClose();}}>Save Activity</button>
            <button className="btn btn-secondary" style={{marginTop:8}} onClick={onClose}>Cancel</button>
          </div>
        </div>
      );
    }

    // ─── App Root ─────────────────────────────────────────────────────────────────
    function App() {
      const [tab, setTab] = useState("home");
      const [shoes, setShoes] = useState([]);
      const [workouts, setWorkouts] = useState([]);
      const [showAddWorkout, setShowAddWorkout] = useState(false);
      const [loaded, setLoaded] = useState(false);
      const [settings, setSettings] = useState({ apiKey: "", fitbitClientId: "" });
      const [fitbitToken, setFitbitToken] = useState(null);
      const [fitbitStats, setFitbitStats] = useState(null);
      const [syncing, setSyncing] = useState(false);
      const [syncError, setSyncError] = useState(null);
      const [savedPlan, setSavedPlan] = useState(null);
      const [weather, setWeather] = useState(null);
      const [weatherLocation, setWeatherLocation] = useState(PRESET_LOCATIONS[0]);
      const [weekNotes, setWeekNotes] = useState({});
      const [races, setRaces] = useState([]);
      const [feeling, setFeeling] = useState(null);
      const [coachMessages, setCoachMessages] = useState([]);
      const redirectUri = window.location.origin + window.location.pathname;

      useEffect(() => {
        async function init() {
          // Check for PKCE callback (?code= in URL params)
          const urlParams = new URLSearchParams(window.location.search);
          const authCode = urlParams.get("code");
          const authState = urlParams.get("state");
          let freshPKCEToken = null;
          if (authCode && authState === "fitbit_pkce") {
            window.history.replaceState({}, "", window.location.pathname);
            const verifier = await sget("rc_fitbit_verifier");
            const pendingClientId = await sget("rc_fitbit_pending_client");
            if (verifier && pendingClientId) {
              try {
                const tokens = await fitbitExchangeCode(authCode, verifier, pendingClientId, window.location.origin + window.location.pathname);
                freshPKCEToken = { access_token: tokens.access_token, refresh_token: tokens.refresh_token, expires_at: Date.now() + tokens.expires_in * 1000 };
                await sset("rc_fitbit_token", freshPKCEToken);
                await sdel("rc_fitbit_verifier");
                await sdel("rc_fitbit_pending_client");
              } catch (err) {
                setSyncError(`Fitbit auth failed: ${err.message}`);
              }
            }
          }

          const [savedShoes, savedWorkouts, savedSettings, savedToken, savedPlanData, savedWeekNotes, savedRaces, savedFeeling, savedCoachMsgs] = await Promise.all([sget("rc_shoes"), sget("rc_workouts"), sget("rc_settings"), sget("rc_fitbit_token"), sget("rc_plan"), sget("rc_week_notes"), sget("rc_races"), sget("rc_feeling"), sget("rc_coach_messages")]);
          const savedLoc = await sget("rc_weather_location");
          const loc = savedLoc || PRESET_LOCATIONS[0];
          if (savedLoc) setWeatherLocation(savedLoc);
          fetchWeather(loc.lat, loc.lon, loc.tz).then(wx => { if (wx) setWeather(wx); });
          if (savedShoes) setShoes(savedShoes);
          if (savedWorkouts) setWorkouts(savedWorkouts);
          if (savedSettings) setSettings(savedSettings);
          if (savedPlanData) setSavedPlan(savedPlanData);
          if (savedWeekNotes) setWeekNotes(savedWeekNotes);
          if (savedRaces) setRaces(savedRaces);
          if (savedFeeling) setFeeling(savedFeeling);
          if (savedCoachMsgs) setCoachMessages(savedCoachMsgs);

          const tokenToUse = freshPKCEToken || savedToken;
          if (tokenToUse?.access_token) {
            setFitbitToken(tokenToUse);
            if (tokenToUse.expires_at > Date.now()) {
              await doFitbitSyncInner(tokenToUse.access_token, savedSettings, savedWorkouts || []);
            } else if (tokenToUse.refresh_token && savedSettings?.fitbitClientId) {
              try {
                const refreshed = await fitbitRefreshToken(tokenToUse.refresh_token, savedSettings.fitbitClientId);
                const newToken = { access_token: refreshed.access_token, refresh_token: refreshed.refresh_token || tokenToUse.refresh_token, expires_at: Date.now() + refreshed.expires_in * 1000 };
                await sset("rc_fitbit_token", newToken);
                setFitbitToken(newToken);
                await doFitbitSyncInner(newToken.access_token, savedSettings, savedWorkouts || []);
              } catch {
                setSyncError("Fitbit token expired — please reconnect in ⚙️ Settings.");
                setFitbitToken(null);
                await sdel("rc_fitbit_token");
              }
            } else {
              setSyncError("Fitbit token expired — please reconnect in ⚙️ Settings.");
              setFitbitToken(null);
              await sdel("rc_fitbit_token");
            }
          }
          setLoaded(true);
        }
        init();
      }, []);

      async function doFitbitSyncInner(token, sett, existingWorkouts) {
        setSyncing(true); setSyncError(null);
        try {
          const stats = await loadFitbitStats(token);
          setFitbitStats(stats);
          const fbWorkouts = stats.activities.map(fitbitActToWorkout).filter(Boolean);
          const existingIds = new Set(existingWorkouts.map(w => w.id));
          const manualKeys = new Set(existingWorkouts.filter(w => w.source !== "fitbit").map(w => `${w.date}_${w.type}`));
          const newOnes = fbWorkouts.filter(w => !existingIds.has(w.id) && !manualKeys.has(`${w.date}_${w.type}`));
          if (newOnes.length) {
            // Auto-assign runs to active shoe and update its mileage
            const currentShoes = await sget("rc_shoes") || [];
            const activeShoe = currentShoes.find(s => s.active);
            let updatedShoes = [...currentShoes];
            const withShoes = newOnes.map(w => {
              if (w.type === "Run" && w.distance && activeShoe) {
                const miles = parseFloat(w.distance) || 0;
                if (miles > 0) updatedShoes = updatedShoes.map(s => s.id === activeShoe.id ? {...s, miles: s.miles + miles} : s);
                return { ...w, shoeId: activeShoe.id };
              }
              return w;
            });
            if (activeShoe) { setShoes(updatedShoes); await sset("rc_shoes", updatedShoes); }
            const merged = [...existingWorkouts, ...withShoes].sort((a, b) => new Date(b.date) - new Date(a.date));
            setWorkouts(merged);
            await sset("rc_workouts", merged);
          }
        } catch (err) {
          if (err.status === 401) { setSyncError("Fitbit token expired — please reconnect in ⚙️ Settings."); setFitbitToken(null); await sdel("rc_fitbit_token"); }
          else setSyncError(`Fitbit sync failed: ${err.message}`);
        }
        setSyncing(false);
      }

      async function handleFitbitConnect(clientId) {
        // PKCE flow — required for Personal app type
        const { verifier, challenge } = await makePKCE();
        await sset("rc_fitbit_verifier", verifier);
        await sset("rc_fitbit_pending_client", clientId);
        const params = new URLSearchParams({
          response_type: "code",
          client_id: clientId,
          redirect_uri: redirectUri,
          scope: "activity heartrate profile",
          code_challenge: challenge,
          code_challenge_method: "S256",
          state: "fitbit_pkce",
        });
        window.location.href = `${FITBIT_AUTH_URL}?${params}`;
      }
      async function handleFitbitDisconnect() {
        setFitbitToken(null); setFitbitStats(null);
        await sdel("rc_fitbit_token"); await sdel("rc_fitbit_verifier");
        const filtered = workouts.filter(w => w.source !== "fitbit");
        setWorkouts(filtered); await sset("rc_workouts", filtered);
      }
      async function saveSettings(ns) { setSettings(ns); await sset("rc_settings", ns); }
      async function saveShoes(ns) { setShoes(ns); await sset("rc_shoes", ns); }
      async function addWorkout(w) {
        // Auto-assign to active shoe if it's a run and no shoe manually chosen
        const activeShoe = shoes.find(s => s.active);
        const shoeId = w.shoeId || (w.type === "Run" && activeShoe ? activeShoe.id : null);
        const workout = { ...w, shoeId: shoeId || undefined };
        const updated = [...workouts, workout].sort((a, b) => new Date(b.date) - new Date(a.date));
        setWorkouts(updated); await sset("rc_workouts", updated);
        if (shoeId && w.distance) {
          const miles = parseFloat(w.distance) || 0;
          if (miles > 0) {
            const updatedShoes = shoes.map(s => s.id == shoeId ? {...s, miles: s.miles + miles} : s);
            setShoes(updatedShoes); await sset("rc_shoes", updatedShoes);
          }
        }
      }
      async function savePlan(text) { setSavedPlan(text); await sset("rc_plan", text); }
      async function saveWeekNotes(weekNum, notes) {
        const updated = { ...weekNotes, [weekNum]: notes };
        setWeekNotes(updated); await sset("rc_week_notes", updated);
      }
      async function saveCoachMessages(msgs) { setCoachMessages(msgs); await sset("rc_coach_messages", msgs); }
      async function addRace(r) { const u=[...races,r]; setRaces(u); await sset("rc_races",u); }
      async function deleteRace(id) { const u=races.filter(r=>r.id!==id); setRaces(u); await sset("rc_races",u); }
      async function saveFeeeling(f) { setFeeling(f); await sset("rc_feeling",f); }
      async function importWorkouts(newOnes) {
        const updated = [...workouts, ...newOnes].sort((a, b) => new Date(b.date) - new Date(a.date));
        setWorkouts(updated); await sset("rc_workouts", updated);
      }
      async function deleteWorkout(id) {
        const updated = workouts.filter(w => w.id !== id);
        setWorkouts(updated); await sset("rc_workouts", updated);
      }
      async function clearAndResync() {
        // Remove all Fitbit-sourced entries, then re-sync fresh
        const kept = workouts.filter(w => w.source !== "fitbit");
        setWorkouts(kept); await sset("rc_workouts", kept);
        if (fitbitToken?.access_token) doFitbitSyncInner(fitbitToken.access_token, settings, kept);
      }

      const tabs = [
        { id: "home", icon: "🏠", label: "Home" },
        { id: "plan", icon: "📋", label: "Plan" },
        { id: "coach", icon: "💬", label: "Coach" },
        { id: "track", icon: "▶️", label: "Track" },
        { id: "log", icon: "📊", label: "Log" },
        { id: "shoes", icon: "👟", label: "Shoes" },
        { id: "settings", icon: "⚙️", label: "Settings" },
      ];

      if (!loaded) return <div style={{display:"flex",justifyContent:"center",alignItems:"center",minHeight:"100vh",background:"#0f1117"}}><div className="spinner" style={{width:36,height:36,borderWidth:3}} /></div>;

      return (
        <>
          <style>{styles}</style>
          <div className="app">
            <div className="header">
              <div className="header-top">
                <div className="logo">Stride<span>AI</span> <span style={{fontSize:10,color:"#5a6080",fontWeight:400}}>v14</span></div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  {syncing && <div className="spinner" style={{width:16,height:16}} />}
                  {fitbitToken && !syncing && <span style={{fontSize:11,color:"#00b0b9",cursor:"pointer",fontWeight:600}} onClick={()=>doFitbitSyncInner(fitbitToken.access_token,settings,workouts)}>↻ Fitbit</span>}
                  <div className="race-badge">🏁 <b>{DAYS_LEFT}d</b> to race</div>
                </div>
              </div>
            </div>
            {syncError && <div className="alert alert-warn" style={{margin:"8px 16px 0",fontSize:12}}>⚠️ {syncError}</div>}
            <div className="content">
              {tab==="home" && <Dashboard workouts={workouts} fitbitStats={fitbitStats} onAddWorkout={()=>setShowAddWorkout(true)} feeling={feeling} onSetFeeling={saveFeeeling} />}
              {tab==="plan" && <PlanTab fitbitStats={fitbitStats} apiKey={settings.apiKey} savedPlan={savedPlan} onSavePlan={savePlan} weather={weather} weatherLocation={weatherLocation} onRefreshWeather={()=>fetchWeather(weatherLocation.lat,weatherLocation.lon,weatherLocation.tz).then(wx=>{if(wx)setWeather(wx);})} weekNotes={weekNotes} onSaveWeekNotes={saveWeekNotes} />}
              {tab==="coach" && <CoachTab fitbitStats={fitbitStats} apiKey={settings.apiKey} races={races} onAddRace={addRace} onDeleteRace={deleteRace} savedMessages={coachMessages} onSaveMessages={saveCoachMessages} />}
              {tab==="track" && <TrackTab apiKey={settings.apiKey} fitbitStats={fitbitStats} onLogWorkout={addWorkout} shoes={shoes} />}
              {tab==="log" && <LogTab workouts={workouts} onAddWorkout={()=>setShowAddWorkout(true)} onDeleteWorkout={deleteWorkout} shoes={shoes} />}
              {tab==="shoes" && <ShoesTab shoes={shoes} onSave={saveShoes} />}
              {tab==="settings" && <SettingsTab settings={settings} onSaveSettings={saveSettings} fitbitToken={fitbitToken} fitbitStats={fitbitStats} onFitbitConnect={handleFitbitConnect} onFitbitDisconnect={handleFitbitDisconnect} onFitbitSync={()=>doFitbitSyncInner(fitbitToken?.access_token,settings,workouts)} onClearAndResync={clearAndResync} syncing={syncing} workouts={workouts} onImportWorkouts={importWorkouts} redirectUri={redirectUri} weatherLocation={weatherLocation} setWeatherLocation={setWeatherLocation} setWeather={setWeather} />}
            </div>
            <div className="tab-bar">
              {tabs.map(t => <button key={t.id} className={`tab ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)}><span className="tab-icon">{t.icon}</span><span>{t.label}</span></button>)}
            </div>
            {showAddWorkout && <AddWorkoutModal onAdd={addWorkout} onClose={()=>setShowAddWorkout(false)} shoes={shoes} />}
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
