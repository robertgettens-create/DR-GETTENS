  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─── Constants ─────────────────────────────────────────────────────────────
    const RACE_DATE = new Date("2026-05-10T07:00:00");
    const TODAY = new Date();
    const DAYS_LEFT = Math.max(0, Math.ceil((RACE_DATE - TODAY) / (1000 * 60 * 60 * 24)));
    const WEEKS_LEFT = Math.floor(DAYS_LEFT / 7);
    const FITBIT_AUTH_URL = "https://www.fitbit.com/oauth2/authorize";
    const FITBIT_TOKEN_URL = "https://api.fitbit.com/oauth2/token";
    const FITBIT_API = "https://api.fitbit.com/1";
    const WORKOUT_ICONS = { Run: "🏃", Bike: "🚴", Kayak: "🛶", Gardening: "🌱", Walk: "🚶", Rest: "😴", Other: "⚡" };

    // ─── Weather helpers (Open-Meteo, no API key needed) ───────────────────────
    function wmoEmoji(c) {
      if (c === 0) return "☀️"; if (c <= 2) return "⛅"; if (c <= 3) return "☁️";
      if (c <= 48) return "🌫️"; if (c <= 57) return "🌦️"; if (c <= 67) return "🌧️";
      if (c <= 77) return "❄️"; if (c <= 82) return "🌦️"; return "⛈️";
    }
    function wmoText(c) {
      if (c === 0) return "Clear"; if (c <= 2) return "Partly cloudy"; if (c <= 3) return "Overcast";
      if (c <= 48) return "Foggy"; if (c <= 57) return "Drizzle"; if (c <= 67) return "Rain";
      if (c <= 77) return "Snow"; if (c <= 82) return "Showers"; return "Thunderstorm";
    }
    const PRESET_LOCATIONS = [
      { id: "longmeadow", name: "Longmeadow, MA", lat: 42.052, lon: -72.577, tz: "America/New_York" },
      { id: "wilmington", name: "Wilmington, NY", lat: 44.372, lon: -73.831, tz: "America/New_York" },
    ];

    async function fetchWeather(lat = 42.052, lon = -72.577, tz = "America/New_York") {
      try {
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_sum,windspeed_10m_max&hourly=temperature_2m,precipitation_probability,weathercode&timezone=${encodeURIComponent(tz)}&forecast_days=7&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch`);
        const d = await res.json();
        const dayNames = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
        return d.daily.time.map((date, i) => {
          const hi = i * 24 + 7; // 7 AM hourly index
          return {
            date, dayName: dayNames[new Date(date + "T12:00:00").getDay()],
            maxTemp: Math.round(d.daily.temperature_2m_max[i]),
            minTemp: Math.round(d.daily.temperature_2m_min[i]),
            precip: d.daily.precipitation_sum[i],
            maxWind: Math.round(d.daily.windspeed_10m_max[i]),
            am7Temp: Math.round(d.hourly.temperature_2m[hi]),
            am7Rain: d.hourly.precipitation_probability[hi],
            am7Code: d.hourly.weathercode[hi],
          };
        });
      } catch { return null; }
    }

    // ─── PKCE helpers ───────────────────────────────────────────────────────────
    function b64url(buf) {
      return btoa(String.fromCharCode(...new Uint8Array(buf)))
        .replace(/\+/g, "-").replace(/\//g, "_").replace(/=/g, "");
    }
    async function makePKCE() {
      const v = new Uint8Array(32);
      crypto.getRandomValues(v);
      const verifier = b64url(v);
      const challenge = b64url(await crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier)));
      return { verifier, challenge };
    }

    // ─── Storage (localStorage) ─────────────────────────────────────────────────
    async function sget(key) {
      try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; }
    }
    async function sset(key, val) {
      try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
    }
    async function sdel(key) {
      try { localStorage.removeItem(key); } catch {}
    }

    // ─── Claude API ─────────────────────────────────────────────────────────────
    function makeSystemPrompt(fitbitStats, races, feeling) {
      const fb = fitbitStats;
      const fbSection = fb
        ? `\n\nRECENT FITBIT DATA (last 30 days):\n- Runs: ${fb.runCount} runs, ${fb.totalMiles.toFixed(1)} miles total\n- Most recent pace: ${fb.avgPace || "N/A"}\n- Avg resting HR: ${fb.restingHR ?? "N/A"} bpm\n- Avg HR during runs: ${fb.avgRunHR ?? "N/A"} bpm\n- Longest recent run: ${fb.longestRun?.toFixed(1) ?? "N/A"} miles\nUse this real data when giving specific advice about pacing, effort, and readiness.`
        : "";
      const todayKey = new Date().toISOString().split("T")[0];
      const todayFeeling = feeling?.date === todayKey ? feeling.feeling : null;
      const feelingSection = todayFeeling ? `\n\nTODAY'S CHECK-IN: Runner is feeling ${todayFeeling.toUpperCase()} today. Factor this into your recommendations.` : "";
      const racesSection = races?.length ? `\n\nRACE HISTORY:\n${races.sort((a,b)=>b.date.localeCompare(a.date)).map(r=>`- ${r.name} (${r.date}): ${r.distance} in ${r.time}${r.notes?` — ${r.notes}`:""}`).join("\n")}` : "";
      return `You are a warm, encouraging personal running coach for a 54-year-old recreational runner in Western Massachusetts.

RUNNER PROFILE:
- Age: 54 · Running for fun and personal satisfaction
- Goal: 5K to half marathon; long-term dream of a marathon
- Training style: Hal Higdon — gradual mileage increase, long slow distance, adequate rest
- Next race: Western Mass Mother's Day Half Marathon, May 10 2026 (${WEEKS_LEFT} weeks away)
- Recent race: Holyoke 10K — completed without stopping, went very slow — solid endurance base
- Cross-training: gardening, kayaking, biking (all count as active recovery)
- Devices: Fitbit Charge 6, Runkeeper app (pace gradually slowing with age — completely normal)
- Location: Western Massachusetts — variable spring weather${fbSection}

COACHING PRINCIPLES:
- Max HR ~166 bpm; Zone 2 (easy/conversational) = 116–133 bpm (Karvonen)
- MOST runs at easy/conversational pace — the "talk test"
- Half marathon goal: COMFORTABLE COMPLETION, not a PR
- 10% weekly mileage increase rule — essential injury prevention
- Recovery takes longer at 54 — rest days are not optional
- Cross-training (gardening, kayaking, biking) counts as active recovery
- Be specific with distances and paces, not vague. Be encouraging — running is for joy.
- Never suggest faster-than-conversational paces unless explicitly asked.${feelingSection}${racesSection}`;
    }

    async function callClaude(messages, apiKey, fitbitStats, races, feeling) {
      if (!apiKey) return "Please add your Anthropic API key in ⚙️ Settings to enable AI coaching.";
      try {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": apiKey,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true",
          },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1500,
            system: makeSystemPrompt(fitbitStats, races, feeling),
            messages,
          }),
        });
        const data = await res.json();
        if (data.error) return `Error: ${data.error.message}`;
        return data.content?.[0]?.text || "No response. Please try again.";
      } catch {
        return "Connection error. Check your API key in Settings and try again.";
      }
    }

    // ─── Fitbit API ──────────────────────────────────────────────────────────────
    async function fitbitFetch(path, token) {
      const res = await fetch(`${FITBIT_API}${path}`, {
        headers: { Authorization: `Bearer ${token}`, "Accept-Language": "en_US" },
      });
      if (res.status === 401) { const e = new Error("expired"); e.status = 401; throw e; }
      if (!res.ok) throw new Error(`Fitbit API error ${res.status}`);
      return res.json();
    }

    async function fitbitExchangeCode(code, verifier, clientId, redirectUri) {
      const res = await fetch(FITBIT_TOKEN_URL, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({
          grant_type: "authorization_code", client_id: clientId,
          code, redirect_uri: redirectUri, code_verifier: verifier,
        }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        const msg = err.errors?.[0]?.message || err.error_description || `Token exchange failed (${res.status})`;
        throw new Error(msg);
      }
      return res.json();
    }

    async function fitbitRefreshToken(refreshToken, clientId) {
      const res = await fetch(FITBIT_TOKEN_URL, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({ grant_type: "refresh_token", client_id: clientId, refresh_token: refreshToken }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.errors?.[0]?.message || "Token refresh failed");
      }
      return res.json();
    }

    async function loadFitbitStats(token) {
      const since = new Date(Date.now() - 30 * 86400000).toISOString().split("T")[0];
      const to = TODAY.toISOString().split("T")[0];
      const [actRes, hrRes] = await Promise.all([
        fitbitFetch(`/user/-/activities/list.json?afterDate=${since}&sort=desc&limit=100&offset=0`, token),
        fitbitFetch(`/user/-/activities/heart/date/${since}/${to}.json`, token),
      ]);
      const activities = actRes.activities || [];
      const runs = activities.filter(a => {
        const n = (a.activityName || "").toLowerCase();
        return n.includes("run") || n.includes("jog") || a.activityTypeId === 90009;
      });
      const totalMiles = runs.reduce((s, r) => s + (r.distance || 0), 0);
      const longestRun = runs.length ? Math.max(...runs.map(r => r.distance || 0)) : 0;
      const paceRun = runs.find(r => r.averageSpeed > 0);
      let avgPace = null;
      if (paceRun) {
        const mph = paceRun.averageSpeed * 0.621371;
        const mpm = 60 / mph;
        avgPace = `${Math.floor(mpm)}:${String(Math.round((mpm % 1) * 60)).padStart(2, "0")}/mi`;
      }
      const hrDays = (hrRes["activities-heart"] || []).filter(d => d.value?.restingHeartRate);
      // Use most recent day's resting HR to match what Fitbit app shows
      const restingHR = hrDays.length ? hrDays[hrDays.length - 1].value.restingHeartRate : null;
      const runsWithHR = runs.filter(r => r.averageHeartRate);
      const avgRunHR = runsWithHR.length ? Math.round(runsWithHR.reduce((s, r) => s + r.averageHeartRate, 0) / runsWithHR.length) : null;
      const paceHistory = runs.filter(r => r.averageSpeed > 0 && r.distance > 0).slice(0, 10).map(r => {
        const mph = r.averageSpeed * 0.621371;
        const mpm = 60 / mph;
        return { date: (r.startTime || "").split("T")[0], distance: parseFloat(r.distance.toFixed(2)), pace: `${Math.floor(mpm)}:${String(Math.round((mpm % 1) * 60)).padStart(2, "0")}`, hr: r.averageHeartRate || null };
      });
      return { activities, runs, runCount: runs.length, totalMiles, avgPace, restingHR, avgRunHR, longestRun, paceHistory };
    }

    function fitbitActToWorkout(act) {
      const n = (act.activityName || "").toLowerCase();
      const type = n.includes("run") || n.includes("jog") ? "Run"
        : n.includes("walk") ? "Walk"
        : n.includes("cycl") || n.includes("bike") ? "Bike"
        : n.includes("kayak") || n.includes("paddle") ? "Kayak"
        : n.includes("garden") ? "Gardening" : "Other";
      const date = (act.startTime || act.originalStartTime || "").split("T")[0];
      if (!date) return null;
      return {
        id: `fb_${act.logId}`, type, date,
        distance: act.distance ? parseFloat(act.distance.toFixed(2)) : "",
        duration: act.duration ? Math.round(act.duration / 60000) : "",
        notes: ["Fitbit", act.averageHeartRate && `${act.averageHeartRate} bpm avg`, act.calories && `${act.calories} cal`].filter(Boolean).join(" · "),
        source: "fitbit",
      };
    }

    // ─── Runkeeper CSV ───────────────────────────────────────────────────────────
    function parseRunkeeperCSV(csv) {
      const lines = csv.split("\n").filter(l => l.trim());
      if (lines.length < 2) return [];
      const headers = lines[0].split(",").map(h => h.replace(/"/g, "").trim());
      return lines.slice(1).map((line, i) => {
        const vals = [];
        let cur = "", inQ = false;
        for (const ch of line + ",") {
          if (ch === '"') inQ = !inQ;
          else if (ch === "," && !inQ) { vals.push(cur.trim()); cur = ""; }
          else cur += ch;
        }
        const row = Object.fromEntries(headers.map((h, j) => [h, vals[j] || ""]));
        if (!row["Date"] || !row["Type"]) return null;
        const parts = (row["Duration"] || "").split(":").map(Number);
        let mins = 0;
        if (parts.length === 3) mins = parts[0] * 60 + parts[1] + parts[2] / 60;
        else if (parts.length === 2) mins = parts[0] + parts[1] / 60;
        const t = row["Type"].toLowerCase();
        return {
          id: `rk_${Date.now()}_${i}`,
          type: t.includes("run") ? "Run" : t.includes("cycl") ? "Bike" : t.includes("kayak") ? "Kayak" : "Other",
          date: row["Date"].split(" ")[0].replace(/\//g, "-"),
          distance: parseFloat(row["Distance (mi)"]) || "",
          duration: Math.round(mins) || "",
          notes: ["Runkeeper", row["Average Pace"] && `${row["Average Pace"]}/mi`, row["Average Heart Rate (bpm)"] && `${row["Average Heart Rate (bpm)"]} bpm avg`].filter(Boolean).join(" · "),
          heartRate: parseFloat(row["Average Heart Rate (bpm)"]) || null,
          source: "runkeeper",
        };
      }).filter(Boolean);
    }

      .source-tag { font-size: 10px; padding: 1px 5px; border-radius: 4px; font-weight: 600; }
      .source-fitbit { color: #00b0b9; background: #0a2030; }

      .source-gps { color: #40c070; background: #0a2a1a; }
      .alert { border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 10px; line-height: 1.5; }

      .filter-pill.active { background: #f07030; color: white; }
      .pace-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #1e2030; font-size: 13px; }
    `;

    // ─── Weekly Mileage Chart ────────────────────────────────────────────────────
    function WeeklyMileageChart({ workouts }) {
      function getMondayKey(dateStr) {
        const d = new Date(dateStr + "T12:00:00");
        const day = d.getDay(); // 0=Sun
        const diff = day === 0 ? -6 : 1 - day;
        const mon = new Date(d); mon.setDate(d.getDate() + diff);
        return mon.toISOString().split("T")[0];
      }
      const weeks = {};
      workouts.filter(w => w.type === "Run" && w.distance).forEach(w => {
        const k = getMondayKey(w.date);
        weeks[k] = (weeks[k] || 0) + (parseFloat(w.distance) || 0);
      });
      const sorted = Object.entries(weeks).sort(([a],[b]) => a.localeCompare(b)).slice(-8);
      if (sorted.length === 0) return null;
      const maxMiles = Math.max(...sorted.map(([,m]) => m), 1);
      return (
        <div className="card" style={{marginBottom:12}}>
          <div className="card-title">Weekly Mileage (last 8 weeks)</div>
          {sorted.map(([weekStart, miles]) => {
            const label = new Date(weekStart + "T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});
            const pct = Math.round((miles / maxMiles) * 100);
            const color = miles < 10 ? "#3b8a3a" : miles < 20 ? "#c0a020" : "#c05010";
            return (
              <div key={weekStart} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:"1px solid #1e2030"}}>
                <span style={{fontSize:11,color:"#5a6080",width:50,flexShrink:0}}>{label}</span>
                <div style={{flex:1,background:"#1a1d2a",borderRadius:4,height:12,overflow:"hidden"}}>
                  <div style={{width:`${pct}%`,height:"100%",background:color,borderRadius:4,transition:"width 0.4s"}} />
                </div>
                <span style={{fontSize:12,color:"#f07030",fontWeight:700,width:36,textAlign:"right"}}>{miles.toFixed(1)}</span>
                <span style={{fontSize:11,color:"#5a6080"}}>mi</span>
              </div>
            );
          })}
        </div>
      );
    }

    // ─── Feeling Check-In ────────────────────────────────────────────────────────
    const FEELINGS = [
      { id:"great", label:"Great", emoji:"💪", color:"#40c070" },
      { id:"good",  label:"Good",  emoji:"😊", color:"#60a0f0" },
      { id:"tired", label:"Tired", emoji:"😴", color:"#c0a020" },
      { id:"sore",  label:"Sore",  emoji:"😬", color:"#c07020" },
      { id:"injured",label:"Injured",emoji:"🤕",color:"#c03020"},
    ];

    function FeelingCheckIn({ feeling, onSetFeeling }) {
      const todayKey = new Date().toISOString().split("T")[0];
      const todayFeeling = feeling?.date === todayKey ? feeling.feeling : null;
      return (
        <div className="card" style={{marginBottom:12}}>
          <div className="card-title">How Are You Feeling Today?</div>
          <div style={{display:"flex",gap:6,justifyContent:"space-between"}}>
            {FEELINGS.map(f => (
              <button key={f.id} onClick={()=>onSetFeeling({feeling:f.id, date:todayKey})}
                style={{flex:1,background:todayFeeling===f.id?f.color+"33":"#1a1d2a",border:`1px solid ${todayFeeling===f.id?f.color:"#2a2d3e"}`,borderRadius:10,padding:"8px 4px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                <span style={{fontSize:20}}>{f.emoji}</span>
                <span style={{fontSize:10,color:todayFeeling===f.id?f.color:"#5a6080",fontWeight:todayFeeling===f.id?700:400}}>{f.label}</span>
              </button>
            ))}
          </div>
          {todayFeeling && <div style={{fontSize:11,color:"#5a6080",marginTop:6,textAlign:"center"}}>Logged for today · your coach will take this into account</div>}
        </div>
      );
    }

    // ─── Dashboard ──────────────────────────────────────────────────────────────
    function Dashboard({ workouts, fitbitStats, onAddWorkout, feeling, onSetFeeling }) {
      const totalRuns = workouts.filter(w => w.type === "Run").length;
      const totalMiles = workouts.filter(w => w.type === "Run").reduce((s, w) => s + (parseFloat(w.distance) || 0), 0);
      const progress = Math.min(100, Math.round((1 - DAYS_LEFT / 47) * 100));
      const fb = fitbitStats;
      const hrColor = fb?.avgRunHR ? (fb.avgRunHR > 133 ? "#c05010" : fb.avgRunHR < 116 ? "#4080c0" : "#40c070") : "#5a6080";
      const hrMsg = fb?.avgRunHR
        ? fb.avgRunHR > 133 ? `Your run HR of ${fb.avgRunHR} bpm is above Zone 2. Try slowing down — if you can't hold a conversation, you're going too fast.`
          : fb.avgRunHR < 116 ? `Your run HR of ${fb.avgRunHR} bpm is below Zone 2. You can pick up the pace slightly — aim for 116–133 bpm.`
          : `Your run HR of ${fb.avgRunHR} bpm is right in Zone 2 (116–133 bpm). Perfect conversational pace — keep it up!`
        : null;

      return (
        <div className="section">
          <div className="countdown-bar">
            <div className="countdown-label">🎯 Western Mass Mother's Day Half Marathon — May 10, 2026</div>
            <div className="progress-track"><div className="progress-fill" style={{ width: `${progress}%` }} /></div>
            <div className="progress-text">{DAYS_LEFT} days remaining · {WEEKS_LEFT} full weeks of training</div>
          </div>
          <FeelingCheckIn feeling={feeling} onSetFeeling={onSetFeeling} />
          <div className="stat-row">
            <div className="stat"><div className="stat-num">{DAYS_LEFT}</div><div className="stat-label">Days to Race</div></div>
            <div className="stat"><div className="stat-num">{fb ? fb.runCount : totalRuns}</div><div className="stat-label">Runs {fb ? "(30d)" : "Logged"}</div></div>
            <div className="stat"><div className="stat-num">{(fb ? fb.totalMiles : totalMiles).toFixed(1)}</div><div className="stat-label">Miles {fb ? "(30d)" : "This App"}</div></div>
          </div>
          {fb && (
            <div className="stat-row">
              <div className="stat"><div className="stat-num" style={{fontSize:18}}>{fb.avgPace || "—"}</div><div className="stat-label">Recent Pace</div></div>
              <div className="stat"><div className="stat-num" style={{fontSize:18,color:"#60a0ff"}}>{fb.restingHR ?? "—"}</div><div className="stat-label">Resting HR</div></div>
              <div className="stat"><div className="stat-num" style={{fontSize:18,color:hrColor}}>{fb.avgRunHR ?? "—"}</div><div className="stat-label">Run HR Avg</div></div>
            </div>
          )}
          {hrMsg && <div className="tip-card"><strong style={{color:hrColor}}>Heart Rate Insight: </strong>{hrMsg}</div>}
          {!fb && <div className="tip-card"><strong style={{color:"#f07030"}}>This week's focus: </strong>With {WEEKS_LEFT} weeks to go, keep long runs at a comfortable conversational pace. Connect Fitbit in ⚙️ Settings for personalized HR insights.</div>}
          {fb?.paceHistory?.length > 0 && (
            <div className="card">
              <div className="card-title">Recent Run Pace History</div>
              {fb.paceHistory.slice(0, 5).map((r, i) => (
                <div className="pace-row" key={i}>
                  <span style={{color:"#5a6080"}}>{r.date}</span>
                  <span style={{color:"#f07030",fontWeight:600}}>{r.pace}/mi</span>
                  <span style={{color:"#a0a8c0"}}>{r.distance} mi</span>
                  {r.hr && <span style={{color:"#60a0ff",fontSize:12}}>{r.hr} bpm</span>}
                </div>
              ))}
            </div>
          )}
          <WeeklyMileageChart workouts={workouts} />
          <div className="card">
            <div className="section-header">
              <div className="card-title" style={{marginBottom:0}}>Recent Activity</div>
              <button className="btn btn-secondary btn-sm" onClick={onAddWorkout}>+ Log</button>
            </div>
            {workouts.length === 0
              ? <div style={{textAlign:"center",padding:"20px 0",color:"#5a6080",fontSize:14}}>No workouts logged yet. Tap + Log to start!</div>
              : workouts.slice(0, 6).map(w => (
                <div className="workout-item" key={w.id}>
                  <div className="workout-icon">{WORKOUT_ICONS[w.type] || "⚡"}</div>
                  <div className="workout-info">
                    <div className="workout-type">
                      {w.type}
                      {w.source === "fitbit" && <span className="source-tag source-fitbit">Fitbit</span>}
                      {w.source === "runkeeper" && <span className="source-tag source-rk">RK</span>}
                    </div>
                    <div className="workout-meta">{new Date(w.date + "T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})} {w.duration ? `· ${Math.round(w.duration)} min` : ""} {w.notes ? `· ${w.notes}` : ""}</div>
                  </div>
                  {w.distance && <div className="workout-dist">{typeof w.distance === "number" ? w.distance.toFixed(1) : w.distance}mi</div>}
                </div>
              ))
            }
          </div>
          <div className="card">
            <div className="card-title">Your Profile</div>
            {[["Age","54 years old"],["Target Race","Mother's Day Half Marathon"],["Training Style","Hal Higdon"],["Cross-Training","Gardening, Kayaking, Biking"],["Devices","Fitbit Charge 6 · Runkeeper"],["Zone 2 HR","116–133 bpm (conversational pace)"]].map(([k,v]) => (
              <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #1e2030",fontSize:13}}>
                <span style={{color:"#5a6080"}}>{k}</span>
                <span style={{color:"#c0c8e0",textAlign:"right",maxWidth:"60%"}}>{v}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── Week Adjust Modal ────────────────────────────────────────────────────────
    function WeekAdjustModal({ weekNum, weekText, existingNotes, onSaveNotes, onRegenerate, onClose, regenLoading }) {
      const [notes, setNotes] = useState(existingNotes || "");
      const examples = ["Traveling Mon–Wed, hotel treadmill only","Rest Saturday — family event","Knee is sore — make it a lighter week","Doing a 5K race on Sunday","Want an extra rest day this weekend","Very busy week — shorten all runs by 1 mile"];
      return (
        <div className="modal-overlay" onClick={e=>e.target.className==="modal-overlay"&&onClose()}>
          <div className="modal">
            <div className="modal-title">Adjust Week {weekNum}</div>
            <div style={{fontSize:11,color:"#5a6080",marginBottom:6,letterSpacing:0.5}}>CURRENT PLAN</div>
            <div style={{background:"#0f1117",borderRadius:8,padding:10,fontSize:12,color:"#a0a8c0",marginBottom:14,maxHeight:160,overflowY:"auto",lineHeight:1.7,whiteSpace:"pre-wrap"}}>{weekText}</div>
            <div className="label">What's different this week?</div>
            <textarea
              style={{width:"100%",background:"#1a1d2a",border:"1px solid #2a2d3e",borderRadius:10,padding:"10px 12px",color:"#f0ede8",fontSize:14,lineHeight:1.6,minHeight:80,resize:"vertical",outline:"none",marginBottom:6}}
              placeholder="Describe any changes, constraints, or goals for this week..."
              value={notes} onChange={e=>setNotes(e.target.value)}
            />
            <div style={{fontSize:11,color:"#5a6080",marginBottom:12}}>
              <strong style={{color:"#a0a8c0"}}>Examples: </strong>
              {examples.map(ex=>(
                <span key={ex} style={{cursor:"pointer",color:"#4080c0",marginRight:8}} onClick={()=>setNotes(n=>n?(n+", "+ex):ex)}>{ex}</span>
              ))}
            </div>
            <button className="btn btn-primary" style={{marginBottom:8}} onClick={()=>onRegenerate(notes)} disabled={regenLoading||!notes.trim()}>
              {regenLoading ? <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}><span className="spinner" style={{width:16,height:16}} />Regenerating week {weekNum}...</span> : `Regenerate Week ${weekNum} with These Notes`}
            </button>
            <button className="btn btn-secondary" style={{marginBottom:8}} onClick={()=>onSaveNotes(notes)} disabled={!notes.trim()}>Save Notes (no regenerate)</button>
            <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
          </div>
        </div>
      );
    }

    // ─── Plan Tab ────────────────────────────────────────────────────────────────
    const ALL_DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
    function PlanTab({ fitbitStats, apiKey, savedPlan, onSavePlan, weather, weatherLocation, onRefreshWeather, weekNotes, onSaveWeekNotes }) {
      const [plan, setPlan] = useState(savedPlan || null);
      const [loading, setLoading] = useState(false);
      const [restDays, setRestDays] = useState(["Wednesday"]);
      const [editIdx, setEditIdx] = useState(null);
      const [editText, setEditText] = useState("");
      const [planLines, setPlanLines] = useState(savedPlan ? savedPlan.split("\n") : []);
      const [adjustWeek, setAdjustWeek] = useState(null); // { weekNum, weekText, startIdx, endIdx }
      const [regenLoading, setRegenLoading] = useState(false);

      function toggleDay(day) {
        setRestDays(prev => prev.includes(day) ? prev.filter(d => d !== day) : [...prev, day]);
      }
      function startEdit(i, text) { setEditIdx(i); setEditText(text); }
      function saveEdit() {
        const updated = [...planLines];
        updated[editIdx] = editText;
        const newPlan = updated.join("\n");
        setPlanLines(updated); setPlan(newPlan); onSavePlan(newPlan); setEditIdx(null);
      }

      // Parse planLines into week segments for the adjust buttons
      function isWeekHeading(line) {
        return /^\*{0,2}Week\s+\d+/i.test(line.trim());
      }
      function getWeekSegments(lines) {
        const segs = []; let start = -1; let num = 0;
        for (let i = 0; i < lines.length; i++) {
          if (isWeekHeading(lines[i])) {
            if (start >= 0) segs.push({ weekNum: num, startIdx: start, endIdx: i - 1 });
            num = parseInt(lines[i].match(/\d+/)?.[0] || "0"); start = i;
          }
        }
        if (start >= 0) segs.push({ weekNum: num, startIdx: start, endIdx: lines.length - 1 });
        return segs;
      }

      function openAdjust(seg) {
        const weekText = planLines.slice(seg.startIdx, seg.endIdx + 1).join("\n");
        setAdjustWeek({ ...seg, weekText });
      }

      async function handleRegenWeek(notes) {
        setRegenLoading(true);
        const { weekNum, weekText, startIdx, endIdx } = adjustWeek;
        const notesCtx = weekNotes[weekNum] ? `Previously saved notes: ${weekNotes[weekNum]}\nNew notes: ${notes}` : notes;
        const intervalCtx = weekNum >= 3 ? `\n\nWORKOUT VARIETY FOR THIS WEEK: Include 1 interval session (e.g. "6 x 400m hard effort with 2 min WALK recovery") and 1 tempo run (comfortably hard, 20–30 min, Zone 3–4). WALK recoveries only — never jog. Hard effort = hard to hold a conversation, not all-out sprint.` : "";
        const newWeekText = await callClaude([{ role: "user", content: `Rewrite only Week ${weekNum} of my half marathon training plan.\n\nCurrent Week ${weekNum}:\n${weekText}\n\nChanges for this week:\n${notesCtx}${intervalCtx}\n\nFORMATTING: Keep same format — Week heading line, then Monday through Sunday, each as "DayName — Activity: distance/duration. Tip: brief tip." Plain text only. Output ONLY Week ${weekNum} content, nothing before or after.` }], apiKey, fitbitStats, null, null);
        onSaveWeekNotes(weekNum, notes);
        const updated = [...planLines];
        const newLines = newWeekText.split("\n");
        updated.splice(startIdx, endIdx - startIdx + 1, ...newLines);
        const newPlan = updated.join("\n");
        setPlanLines(updated); setPlan(newPlan); onSavePlan(newPlan);
        setRegenLoading(false); setAdjustWeek(null);
      }

      function handleSaveNotesOnly(notes) {
        onSaveWeekNotes(adjustWeek.weekNum, notes);
        setAdjustWeek(null);
      }

      async function generate() {
        setLoading(true);
        const today = TODAY.toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
        const fb = fitbitStats;
        const dataCtx = fb ? `\n\nMy recent Fitbit data (last 30 days): ${fb.runCount} runs totaling ${fb.totalMiles.toFixed(1)} miles, most recent pace ${fb.avgPace || "unknown"}, average run HR ${fb.avgRunHR ?? "unknown"} bpm, resting HR ${fb.restingHR ?? "unknown"} bpm, longest recent run ${fb.longestRun?.toFixed(1) ?? "unknown"} miles.` : "";
        const restCtx = restDays.length > 0 ? `\n\nPreferred rest days: ${restDays.join(", ")}.` : "";
        const wxCtx = weather?.length ? `\n\nThis week's 7AM forecast for Western MA (runner goes out at 7AM):\n${weather.slice(0,7).map(d=>`${d.dayName}: ${d.am7Temp}°F, ${wmoText(d.am7Code)}${d.am7Rain>30?`, ${d.am7Rain}% rain chance`:""}${d.maxWind>15?`, ${d.maxWind}mph wind`:""}`).join("\n")}\nNote any days with bad weather and suggest treadmill or schedule adjustments.` : "";
        // Compute exact Monday-start week dates so Claude can't get them wrong
        const raceDate = new Date("2026-05-10");
        const todayDate = new Date();
        const dow = todayDate.getDay(); // 0=Sun,1=Mon
        const daysToMon = dow === 1 ? 0 : dow === 0 ? 1 : 8 - dow;
        let weekStart = new Date(todayDate); weekStart.setDate(todayDate.getDate() + daysToMon);
        weekStart.setHours(0,0,0,0);
        const fmt = d => d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
        const weekSchedule = [];
        for (let w = 1; weekStart <= raceDate; w++) {
          const sun = new Date(weekStart); sun.setDate(weekStart.getDate() + 6);
          const weekEnd = sun > raceDate ? raceDate : sun;
          const isRaceWeek = weekEnd >= raceDate;
          weekSchedule.push(`Week ${w}: Monday ${fmt(weekStart)} – ${isRaceWeek ? `Sunday ${fmt(raceDate)} (RACE DAY — half marathon!)` : `Sunday ${fmt(weekEnd)}`}`);
          weekStart.setDate(weekStart.getDate() + 7);
        }
        const weekCtx = `\n\nEXACT WEEK DATES (use these precisely — do not invent different dates):\n${weekSchedule.join("\n")}`;
        const text = await callClaude([{ role: "user", content: `Generate a training plan for the Mother's Day Half Marathon on Sunday May 10, 2026. Today is ${today}.${dataCtx}${restCtx}${wxCtx}${weekCtx}\n\nWORKOUT VARIETY (starting week 3 once base is established):\n- Include 1 interval session per week: e.g. "6 x 400m hard effort with 2 min WALK recovery" or "8 x 1 min hard / 2 min walk". WALK recoveries only — never jog recoveries.\n- Include 1 tempo run per week: comfortably hard sustained effort, 20–30 min, Zone 3–4 HR (134–150 bpm). Not in weeks 1–2.\n- "Hard effort" for a 54-year-old means hard to hold a conversation, NOT all-out sprint.\n- All other runs remain easy/conversational (Zone 2, 116–133 bpm).\n- Race week: taper significantly, easy runs only Mon–Fri, Rest Saturday, RACE Sunday May 10.\n\nFORMATTING RULES:\n- Every week MUST start on Monday and end on Sunday\n- Show all 7 days for every week: Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday\n- Plain text only, no markdown symbols (no **, no ##)\n- Each day: "DayName — Activity: distance/duration. Tip: one brief tip."\n- Week heading exactly: "Week N (Mon Date – Sun Date)"\n\nMake it practical and encouraging for a 54-year-old running for fun.` }], apiKey, fitbitStats, null, null);
        setPlan(text); setPlanLines(text.split("\n")); onSavePlan(text); setLoading(false);
      }

      const weekSegs = plan ? getWeekSegments(planLines) : [];

      return (
        <div className="section">
          <div className="section-header"><div className="section-title">Training Plan</div></div>
          {fitbitStats
            ? <div className="alert alert-success" style={{marginBottom:12}}>✓ Fitbit connected — plan uses your real fitness data.</div>
            : <div className="tip-card">Connect Fitbit in ⚙️ Settings for a plan built around your real pace and HR.</div>
          }
          {weather && weather.length > 0 && (
            <div className="card" style={{marginBottom:12}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <div className="card-title" style={{marginBottom:0}}>7-Day Forecast · 7AM · {weatherLocation?.name || "Longmeadow, MA"}</div>
                <button onClick={onRefreshWeather} style={{background:"none",border:"1px solid #2a2d3e",borderRadius:8,color:"#a0a8c0",fontSize:11,padding:"3px 8px",cursor:"pointer"}}>↻ Refresh</button>
              </div>
              {weather.map(d => (
                <div key={d.date} style={{display:"flex",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #1e2030",gap:8}}>
                  <span style={{width:34,fontSize:12,color:"#5a6080",fontWeight:600}}>{d.dayName.slice(0,3)}</span>
                  <span style={{fontSize:18,width:26}}>{wmoEmoji(d.am7Code)}</span>
                  <span style={{fontSize:14,color:"#f07030",fontWeight:700,width:36}}>{d.am7Temp}°F</span>
                  <span style={{fontSize:12,color:"#a0a8c0",flex:1}}>{wmoText(d.am7Code)}</span>
                  {d.am7Rain > 30 && <span style={{fontSize:11,color:"#6090f0"}}>{d.am7Rain}% rain</span>}
                  {d.maxWind > 15 && <span style={{fontSize:11,color:"#a0a8c0"}}>{d.maxWind}mph</span>}
                </div>
              ))}
            </div>
          )}
          <div className="card" style={{marginBottom:12}}>
            <div className="card-title">Rest Days for This Plan</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {ALL_DAYS.map(day => (
                <button key={day} onClick={()=>toggleDay(day)} style={{
                  background: restDays.includes(day) ? "#3a1010" : "#1e2030",
                  color: restDays.includes(day) ? "#f07060" : "#a0a8c0",
                  border: restDays.includes(day) ? "1px solid #f07060" : "1px solid #2a2d3e",
                  borderRadius:20, padding:"5px 12px", fontSize:12, cursor:"pointer", fontWeight: restDays.includes(day)?700:400
                }}>{day.slice(0,3)}{restDays.includes(day)?" ✕":""}</button>
              ))}
            </div>
            <div style={{fontSize:11,color:"#5a6080",marginTop:6}}>{restDays.length===0?"No rest days selected.":restDays.length===1?`${restDays[0]} will be your rest day.`:`${restDays.join(", ")} will be rest days.`}</div>
          </div>
          <button className="btn btn-primary" style={{marginBottom:12}} onClick={generate} disabled={loading}>
            {loading ? "Generating your plan..." : plan ? "Regenerate Full Plan" : "Generate My Training Plan"}
          </button>
          {!plan && !loading && <div className="tip-card">Your AI coach builds a {WEEKS_LEFT}-week Hal Higdon-style plan. Once generated it's saved — tap ✏️ on any day to edit, or use "Adjust Week" to modify a whole week with notes.</div>}
          {loading && <div className="loading-row"><div className="spinner" /><span>Building your personalized plan...</span></div>}
          {plan && !loading && (
            <div className="card">
              <div style={{fontSize:11,color:"#5a6080",marginBottom:8}}>TAP ✏️ ON ANY DAY TO EDIT · USE ADJUST WEEK FOR BIGGER CHANGES</div>
              {planLines.map((line, i) => {
                const isWeek = isWeekHeading(line);
                const isDay = line.match(/^(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday)/i);
                const seg = isWeek ? weekSegs.find(s => s.startIdx === i) : null;
                if (editIdx === i) return (
                  <div key={i} style={{margin:"4px 0"}}>
                    <textarea style={{width:"100%",background:"#1a1d2a",border:"1px solid #f07030",borderRadius:8,padding:"8px",color:"#f0ede8",fontSize:13,lineHeight:1.6,minHeight:60,resize:"vertical"}} value={editText} onChange={e=>setEditText(e.target.value)} autoFocus />
                    <div style={{display:"flex",gap:8,marginTop:4}}>
                      <button className="btn btn-primary btn-sm" onClick={saveEdit}>Save</button>
                      <button className="btn btn-secondary btn-sm" onClick={()=>setEditIdx(null)}>Cancel</button>
                    </div>
                  </div>
                );
                if (isWeek && seg) return (
                  <div key={i} style={{marginTop:i>0?20:0}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid #1e2030",paddingBottom:6,marginBottom:4}}>
                      <span style={{color:"#f07030",fontWeight:700,fontSize:15}}>{line.replace(/[*#]/g,"").trim()}</span>
                      <button onClick={()=>openAdjust(seg)} style={{background:"#1e2030",border:"1px solid #2a2d3e",borderRadius:8,padding:"3px 10px",fontSize:11,color:"#a0a8c0",cursor:"pointer",fontWeight:600}}>
                        {weekNotes[seg.weekNum] ? "📝 Adjust" : "Adjust Week"}
                      </button>
                    </div>
                    {weekNotes[seg.weekNum] && <div style={{fontSize:11,color:"#6080a0",background:"#101a2a",borderRadius:6,padding:"4px 8px",marginBottom:6}}>📝 {weekNotes[seg.weekNum]}</div>}
                  </div>
                );
                if (isDay) return (
                  <div key={i} style={{display:"flex",alignItems:"flex-start",gap:6,marginTop:10,cursor:"pointer"}} onClick={()=>startEdit(i,line)}>
                    <span style={{color:"#f0ede8",fontWeight:600,fontSize:14,flex:1}}>{line}</span>
                    <span style={{fontSize:12,color:"#5a6080",flexShrink:0}}>✏️</span>
                  </div>
                );
                return <div key={i} style={{color:"#a0a8c0",fontSize:13,paddingLeft:line.trim().startsWith("-")?12:0,cursor:line.trim()?"pointer":"default"}} onClick={()=>line.trim()&&startEdit(i,line)}>{line}</div>;
              })}
            </div>
          )}
          {adjustWeek && (
            <WeekAdjustModal
              weekNum={adjustWeek.weekNum}
              weekText={adjustWeek.weekText}
              existingNotes={weekNotes[adjustWeek.weekNum] || ""}
              onSaveNotes={handleSaveNotesOnly}
              onRegenerate={handleRegenWeek}
              onClose={()=>setAdjustWeek(null)}
              regenLoading={regenLoading}
            />
          )}
        </div>
      );
    }

    // ─── Track Tab ───────────────────────────────────────────────────────────────
    function TrackTab({ apiKey, fitbitStats, onLogWorkout, shoes }) {
      // State
      const [status, setStatus] = useState("idle"); // idle | running | paused | done
      const [elapsed, setElapsed] = useState(0);       // seconds
      const [distance, setDistance] = useState(0);     // miles
      const [positions, setPositions] = useState([]);  // [{lat,lon,ts}]
      const [splits, setSplits] = useState([]);         // [{quarter, label, pace, time}]
      const [currentPace, setCurrentPace] = useState(null); // "MM:SS"
      const [coachMsg, setCoachMsg] = useState("");
      const [coachLoading, setCoachLoading] = useState(false);
      const [audioEnabled, setAudioEnabled] = useState(true);
      const [saved, setSaved] = useState(false);
      const [gpsAccuracy, setGpsAccuracy] = useState(null);

      const watchRef = useRef(null);
      const timerRef = useRef(null);
      const startTimeRef = useRef(null);
      const pausedElapsedRef = useRef(0);
      const lastPosRef = useRef(null);
      const accDistRef = useRef(0);
      const lastSplitMileRef = useRef(0);
      const mapRef = useRef(null);
      const leafletMapRef = useRef(null);
      const polylineRef = useRef(null);
      const mapInitRef = useRef(false);
      const latLngsRef = useRef([]);

      // Haversine distance in miles between two {lat,lon} points
      function haversine(a, b) {
        const R = 3958.8;
        const dLat = (b.lat - a.lat) * Math.PI / 180;
        const dLon = (b.lon - a.lon) * Math.PI / 180;
        const s = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.asin(Math.sqrt(s));
      }

      function fmtTime(s) {
        const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
        return h>0 ? `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}` : `${m}:${String(sec).padStart(2,"0")}`;
      }

      function fmtPace(miles, secs) {
        if (miles < 0.05) return null;
        const secsPerMile = secs / miles;
        const m = Math.floor(secsPerMile / 60), s = Math.round(secsPerMile % 60);
        return `${m}:${String(s).padStart(2,"0")}`;
      }

      function quarterLabel(n) {
        const miles = Math.floor(n / 4), rem = n % 4;
        if (miles === 0) { if(rem===1) return "¼ mile"; if(rem===2) return "½ mile"; if(rem===3) return "¾ mile"; }
        if (rem === 0) return `Mile ${miles}`;
        if (rem === 1) return `Mile ${miles} ¼`;
        if (rem === 2) return `Mile ${miles} ½`;
        return `Mile ${miles} ¾`;
      }
      function quarterLabelSpoken(n) {
        const miles = Math.floor(n / 4), rem = n % 4;
        if (miles === 0) { if(rem===1) return "Quarter mile"; if(rem===2) return "Half mile"; if(rem===3) return "Three quarters of a mile"; }
        if (rem === 0) return `Mile ${miles}`;
        if (rem === 1) return `Mile ${miles} and a quarter`;
        if (rem === 2) return `Mile ${miles} and a half`;
        return `Mile ${miles} and three quarters`;
      }

      function speak(text) {
        if (!audioEnabled) return;
        const u = new SpeechSynthesisUtterance(text);
        u.rate = 0.95; u.pitch = 1;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(u);
      }

      // Initialize Leaflet map once the div is in the DOM
      useEffect(() => {
        if (status === "idle" || status === "done") return;
        if (!mapRef.current || mapInitRef.current) return;
        // Small delay to ensure DOM is ready
        const t = setTimeout(() => {
          if (!mapRef.current || mapInitRef.current) return;
          const map = window.L.map(mapRef.current, { zoomControl: true, attributionControl: false });
          window.L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
          polylineRef.current = window.L.polyline([], { color: "#f07030", weight: 4 }).addTo(map);
          leafletMapRef.current = map;
          mapInitRef.current = true;
        }, 300);
        return () => clearTimeout(t);
      }, [status]);

      // Cleanup on unmount
      useEffect(() => {
        return () => {
          stopTracking(true);
          if (leafletMapRef.current) { leafletMapRef.current.remove(); leafletMapRef.current = null; mapInitRef.current = false; }
        };
      }, []);

      function stopTracking(silent = false) {
        if (watchRef.current != null) { navigator.geolocation.clearWatch(watchRef.current); watchRef.current = null; }
        if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
        if (!silent) {
          pausedElapsedRef.current = elapsed;
        }
      }

      function startRun() {
        setSaved(false);
        setStatus("running");
        setElapsed(0); setDistance(0); setPositions([]); setSplits([]); setCurrentPace(null); setCoachMsg(""); setGpsAccuracy(null);
        accDistRef.current = 0; lastSplitMileRef.current = 0; lastPosRef.current = null; latLngsRef.current = [];
        pausedElapsedRef.current = 0;
        startTimeRef.current = Date.now();
        // Timer
        timerRef.current = setInterval(() => {
          const e = Math.floor((Date.now() - startTimeRef.current) / 1000) + pausedElapsedRef.current;
          setElapsed(e);
          // Update rolling pace every 5 sec
          if (accDistRef.current > 0.1) setCurrentPace(fmtPace(accDistRef.current, e));
        }, 1000);
        // GPS watch
        watchRef.current = navigator.geolocation.watchPosition(
          pos => {
            const { latitude: lat, longitude: lon, accuracy } = pos.coords;
            if (accuracy > 65) return; // ignore poor fixes
            setGpsAccuracy(Math.round(accuracy));
            const newPt = { lat, lon, ts: Date.now() };
            if (lastPosRef.current) {
              const d = haversine(lastPosRef.current, newPt);
              if (d > 0.005 && d < 0.5) { // ignore micro-jitter and GPS jumps
                accDistRef.current += d;
                setDistance(accDistRef.current);
              }
            }
            lastPosRef.current = newPt;
            setPositions(prev => [...prev, newPt]);
            latLngsRef.current = [...latLngsRef.current, [lat, lon]];
            // Update map
            if (polylineRef.current && leafletMapRef.current) {
              polylineRef.current.setLatLngs(latLngsRef.current);
              leafletMapRef.current.setView([lat, lon], leafletMapRef.current.getZoom() || 16);
            }
            // Quarter-mile split announcements
            const completedQuarter = Math.floor(accDistRef.current / 0.25);
            if (completedQuarter > lastSplitMileRef.current) {
              const currentElapsed = Math.floor((Date.now() - startTimeRef.current) / 1000) + pausedElapsedRef.current;
              const pace = fmtPace(accDistRef.current, currentElapsed);
              const label = quarterLabel(completedQuarter);
              const split = { quarter: completedQuarter, label, pace, time: fmtTime(currentElapsed) };
              setSplits(prev => [...prev, split]);
              lastSplitMileRef.current = completedQuarter;
              const isMile = completedQuarter % 4 === 0;
              const completedMile = completedQuarter / 4;
              if (isMile) {
                speak(`${quarterLabelSpoken(completedQuarter)}. Pace ${pace ? pace.replace(":"," minutes ") + " seconds per mile" : "calculating"}. Total time ${fmtTime(currentElapsed)}.`);
                if (apiKey && [2,4,6].includes(completedMile)) fetchCoachTip(completedMile, pace, currentElapsed, accDistRef.current);
              } else {
                speak(`${quarterLabelSpoken(completedQuarter)}. Pace ${pace ? pace.replace(":"," minutes ") + " seconds per mile" : "calculating"}.`);
              }
            }
          },
          err => console.warn("GPS error:", err.message),
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
        speak("Run started. Good luck!");
      }

      function pauseRun() {
        stopTracking();
        pausedElapsedRef.current = elapsed;
        startTimeRef.current = null;
        setStatus("paused");
        speak("Run paused.");
      }

      function resumeRun() {
        setStatus("running");
        startTimeRef.current = Date.now();
        timerRef.current = setInterval(() => {
          const e = Math.floor((Date.now() - startTimeRef.current) / 1000) + pausedElapsedRef.current;
          setElapsed(e);
          if (accDistRef.current > 0.1) setCurrentPace(fmtPace(accDistRef.current, e));
        }, 1000);
        watchRef.current = navigator.geolocation.watchPosition(
          pos => {
            const { latitude: lat, longitude: lon, accuracy } = pos.coords;
            if (accuracy > 65) return;
            setGpsAccuracy(Math.round(accuracy));
            const newPt = { lat, lon, ts: Date.now() };
            if (lastPosRef.current) {
              const d = haversine(lastPosRef.current, newPt);
              if (d > 0.005 && d < 0.5) { accDistRef.current += d; setDistance(accDistRef.current); }
            }
            lastPosRef.current = newPt;
            latLngsRef.current = [...latLngsRef.current, [lat, lon]];
            if (polylineRef.current && leafletMapRef.current) {
              polylineRef.current.setLatLngs(latLngsRef.current);
              leafletMapRef.current.setView([lat, lon], leafletMapRef.current.getZoom() || 16);
            }
            // Continue quarter-mile splits after resume
            const completedQuarter = Math.floor(accDistRef.current / 0.25);
            if (completedQuarter > lastSplitMileRef.current) {
              const currentElapsed = Math.floor((Date.now() - startTimeRef.current) / 1000) + pausedElapsedRef.current;
              const pace = fmtPace(accDistRef.current, currentElapsed);
              const label = quarterLabel(completedQuarter);
              const split = { quarter: completedQuarter, label, pace, time: fmtTime(currentElapsed) };
              setSplits(prev => [...prev, split]);
              lastSplitMileRef.current = completedQuarter;
              const isMile = completedQuarter % 4 === 0;
              const completedMile = completedQuarter / 4;
              if (isMile) {
                speak(`${quarterLabelSpoken(completedQuarter)}. Pace ${pace ? pace.replace(":"," minutes ") + " seconds per mile" : "calculating"}. Total time ${fmtTime(currentElapsed)}.`);
                if (apiKey && [2,4,6].includes(completedMile)) fetchCoachTip(completedMile, pace, currentElapsed, accDistRef.current);
              } else {
                speak(`${quarterLabelSpoken(completedQuarter)}. Pace ${pace ? pace.replace(":"," minutes ") + " seconds per mile" : "calculating"}.`);
              }
            }
          },
          err => console.warn("GPS error:", err),
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
        speak("Run resumed.");
      }

      function finishRun() {
        stopTracking();
        setStatus("done");
        const finalPace = fmtPace(accDistRef.current, elapsed);
        speak(`Run complete! ${accDistRef.current.toFixed(2)} miles in ${fmtTime(elapsed)}. ${finalPace ? "Average pace " + finalPace.replace(":"," minutes ") + " seconds per mile." : ""} Great job!`);
        if (apiKey) fetchCoachTip("finish", finalPace, elapsed, accDistRef.current);
      }

      async function fetchCoachTip(milestone, pace, elapsedSec, dist) {
        setCoachLoading(true);
        const fb = fitbitStats;
        const ctx = fb ? `Runner's recent avg pace: ${fb.avgPace||"unknown"}, resting HR ${fb.restingHR||"unknown"} bpm.` : "";
        const prompt = milestone === "finish"
          ? `The runner just finished a ${dist.toFixed(2)}-mile run in ${fmtTime(elapsedSec)} (pace: ${pace||"unknown"}/mi). ${ctx} Give a brief (2-3 sentence) encouraging post-run message and one recovery tip.`
          : `A 54-year-old runner just passed mile ${milestone} of their run. Current pace: ${pace||"unknown"}/mi, elapsed: ${fmtTime(elapsedSec)}, distance: ${dist.toFixed(2)} miles. ${ctx} Give a brief (1-2 sentence) motivational coaching cue for this point in the run.`;
        try {
          const reply = await callClaude([{ role:"user", content: prompt }], apiKey, fitbitStats, null, null);
          setCoachMsg(reply);
          if (audioEnabled) speak(reply);
        } catch(e) { console.warn("Coach tip failed:", e); }
        setCoachLoading(false);
      }

      function saveRun() {
        const today = new Date().toISOString().split("T")[0];
        onLogWorkout({
          id: Date.now(),
          type: "Run",
          date: today,
          distance: parseFloat(accDistRef.current.toFixed(2)),
          duration: Math.round(elapsed / 60),
          notes: `GPS tracked run. Avg pace: ${fmtPace(accDistRef.current, elapsed) || "N/A"}/mi. ${splits.length} mile splits.`,
          source: "gps",
        });
        setSaved(true);
        speak("Run saved to your log.");
      }

      const activeShoe = shoes?.find(s => s.active);

      return (
        <div className="section">
          <div className="section-header">
            <div className="section-title">Run Tracker</div>
            <button onClick={()=>setAudioEnabled(v=>!v)} style={{background:"none",border:"1px solid #2a2d3e",borderRadius:8,padding:"3px 10px",fontSize:12,color:audioEnabled?"#40c070":"#5a6080",cursor:"pointer"}}>
              {audioEnabled ? "🔊 Audio On" : "🔇 Audio Off"}
            </button>
          </div>

          {status === "idle" && (
            <>
              <div className="tip-card">
                GPS tracks your route, pace, and distance. Audio announcements every quarter mile. Your coach checks in at miles 2, 4, and 6.
                {activeShoe && <div style={{marginTop:6,color:"#40c070",fontSize:12}}>⭐ Active shoe: <strong>{activeShoe.name}</strong> — miles will auto-count.</div>}
                {!activeShoe && <div style={{marginTop:6,color:"#c07820",fontSize:12}}>Tip: set an Active shoe in 👟 Shoes to auto-track mileage.</div>}
              </div>
              <div className="alert alert-info" style={{fontSize:12}}>
                <div style={{marginBottom:6}}>When prompted, <strong>allow location access</strong>. Keep your screen on during the run.</div>
                <div style={{marginBottom:6,color:"#c0a020",fontWeight:600}}>📱 iPhone tips for best GPS:</div>
                <div style={{lineHeight:1.8}}>
                  1. <strong>Add to Home Screen</strong> (Share → Add to Home Screen) — runs as an app and gets better GPS access than Safari.<br/>
                  2. If GPS won't start: <strong>Settings → Safari → turn off "Prevent Cross-Site Tracking"</strong> temporarily.<br/>
                  3. Keep the screen on and don't lock your phone mid-run — locking pauses GPS in Safari.
                </div>
              </div>
              <button className="btn btn-primary" style={{fontSize:20,padding:"16px",letterSpacing:1}} onClick={startRun}>▶ Start Run</button>
            </>
          )}

          {(status === "running" || status === "paused") && (
            <>
              {/* Big live stats */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                <div className="card" style={{textAlign:"center",padding:"16px 8px"}}>
                  <div style={{fontSize:11,color:"#5a6080",marginBottom:4}}>DISTANCE</div>
                  <div style={{fontSize:36,fontWeight:700,color:"#f07030"}}>{distance.toFixed(2)}</div>
                  <div style={{fontSize:12,color:"#a0a8c0"}}>miles</div>
                </div>
                <div className="card" style={{textAlign:"center",padding:"16px 8px"}}>
                  <div style={{fontSize:11,color:"#5a6080",marginBottom:4}}>TIME</div>
                  <div style={{fontSize:36,fontWeight:700,color:"#f0ede8"}}>{fmtTime(elapsed)}</div>
                </div>
                <div className="card" style={{textAlign:"center",padding:"16px 8px"}}>
                  <div style={{fontSize:11,color:"#5a6080",marginBottom:4}}>CURRENT PACE</div>
                  <div style={{fontSize:28,fontWeight:700,color:"#60a0ff"}}>{currentPace || "—"}</div>
                  <div style={{fontSize:12,color:"#a0a8c0"}}>min/mi</div>
                </div>
                <div className="card" style={{textAlign:"center",padding:"16px 8px"}}>
                  <div style={{fontSize:11,color:"#5a6080",marginBottom:4}}>SPLITS</div>
                  <div style={{fontSize:28,fontWeight:700,color:"#40c070"}}>{splits.length}</div>
                  <div style={{fontSize:12,color:"#a0a8c0"}}>quarters done</div>
                </div>
              </div>

              {/* GPS accuracy indicator */}
              {gpsAccuracy !== null && (
                <div style={{textAlign:"center",fontSize:11,marginBottom:8,color: gpsAccuracy < 20 ? "#40c070" : gpsAccuracy < 50 ? "#c0a020" : "#c04040"}}>
                  GPS: {gpsAccuracy < 20 ? "Good" : gpsAccuracy < 50 ? "Fair" : "Weak"} ({gpsAccuracy}m)
                </div>
              )}

              {/* Map */}
              <div ref={mapRef} style={{height:220,borderRadius:12,overflow:"hidden",marginBottom:12,background:"#1a1d2a",border:"1px solid #2a2d3e"}} />

              {/* Controls */}
              <div style={{display:"flex",gap:10,marginBottom:12}}>
                {status === "running"
                  ? <button className="btn btn-secondary" style={{flex:1,padding:"14px",fontSize:16}} onClick={pauseRun}>⏸ Pause</button>
                  : <button className="btn btn-primary" style={{flex:1,padding:"14px",fontSize:16}} onClick={resumeRun}>▶ Resume</button>
                }
                <button onClick={finishRun} style={{flex:1,padding:"14px",fontSize:16,background:"#c03020",border:"none",borderRadius:12,color:"white",cursor:"pointer",fontWeight:700}}>⏹ Finish</button>
              </div>

              {/* Coach message */}
              {(coachMsg || coachLoading) && (
                <div className="card" style={{borderLeft:"3px solid #f07030"}}>
                  <div style={{fontSize:11,color:"#5a6080",marginBottom:4}}>YOUR COACH</div>
                  {coachLoading ? <div style={{color:"#5a6080",fontSize:13}}>Getting coaching tip...</div> : <div style={{fontSize:14,color:"#f0ede8",lineHeight:1.6}}>{coachMsg}</div>}
                </div>
              )}

              {/* Quarter-mile splits */}
              {splits.length > 0 && (
                <div className="card">
                  <div className="card-title">Splits</div>
                  {splits.map(s => (
                    <div key={s.quarter} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #1e2030",fontSize:13}}>
                      <span style={{color: s.quarter % 4 === 0 ? "#f07030" : "#5a6080", fontWeight: s.quarter % 4 === 0 ? 600 : 400}}>{s.label}</span>
                      <span style={{color:"#f07030",fontWeight:600}}>{s.pace}/mi</span>
                      <span style={{color:"#a0a8c0"}}>{s.time}</span>
                    </div>
                  ))}
                </div>
              )}
            </>
          )}

          {status === "done" && (
            <>
              <div className="card" style={{textAlign:"center",padding:"20px"}}>
                <div style={{fontSize:28,marginBottom:8}}>🎉</div>
                <div style={{fontSize:22,fontWeight:700,color:"#f07030",marginBottom:4}}>Run Complete!</div>
                <div style={{fontSize:32,fontWeight:700,color:"#f0ede8",marginBottom:4}}>{distance.toFixed(2)} mi</div>
                <div style={{fontSize:18,color:"#a0a8c0",marginBottom:4}}>{fmtTime(elapsed)}</div>
                <div style={{fontSize:18,color:"#60a0ff"}}>{fmtPace(distance, elapsed) || "—"} /mi avg pace</div>
              </div>
              {coachMsg && (
                <div className="card" style={{borderLeft:"3px solid #f07030"}}>
                  <div style={{fontSize:11,color:"#5a6080",marginBottom:4}}>POST-RUN COACH</div>
                  <div style={{fontSize:14,color:"#f0ede8",lineHeight:1.6}}>{coachMsg}</div>
                </div>
              )}
              {splits.length > 0 && (
                <div className="card">
                  <div className="card-title">Mile Splits</div>
                  {splits.map(s => (
                    <div key={s.mile} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #1e2030",fontSize:13}}>
                      <span style={{color:"#5a6080"}}>Mile {s.mile}</span>
                      <span style={{color:"#f07030",fontWeight:600}}>{s.pace}/mi</span>
                      <span style={{color:"#a0a8c0"}}>{s.time}</span>
                    </div>
                  ))}
                </div>
              )}
              {!saved
                ? <button className="btn btn-primary" style={{marginBottom:8}} onClick={saveRun}>Save Run to Log</button>
                : <div className="alert alert-success">✓ Saved to your activity log{activeShoe ? ` and added to ${activeShoe.name}` : ""}.</div>
              }
              <button className="btn btn-secondary" onClick={()=>{setStatus("idle");setElapsed(0);setDistance(0);setPositions([]);setSplits([]);setCurrentPace(null);setCoachMsg("");setSaved(false);accDistRef.current=0;lastSplitMileRef.current=0;lastPosRef.current=null;latLngsRef.current=[];if(leafletMapRef.current){leafletMapRef.current.remove();leafletMapRef.current=null;mapInitRef.current=false;polylineRef.current=null;};}}>Start New Run</button>
            </>
          )}
        </div>
      );
    }

    // ─── Log Tab ──────────────────────────────────────────────────────────────────
    function LogTab({ workouts, onAddWorkout, onDeleteWorkout, shoes }) {
      const [filter, setFilter] = useState("All");
      const [confirmDelete, setConfirmDelete] = useState(null);
      const types = ["All","Run","Walk","Bike","Kayak","Gardening","Rest","Other"];
      const filtered = filter === "All" ? workouts : workouts.filter(w => w.type === filter);
      return (
        <div className="section">

            : <div className="card">{filtered.map(w => (

                  <div className="workout-meta">{new Date(w.date+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})} {w.duration?`· ${Math.round(w.duration)} min`:""} {w.shoeId&&shoes?.find(s=>s.id==w.shoeId)?`· 👟 ${shoes.find(s=>s.id==w.shoeId).name}`:""}{w.effort && <span style={{fontSize:11, color:["","#40c070","#80c040","#c0a020","#c05010","#c02020"][w.effort], fontWeight:600}}> · RPE {w.effort}</span>} {w.notes?`· ${w.notes}`:""}</div>

                      <button onClick={()=>setConfirmDelete(null)} style={{background:"#1e2030",border:"none",borderRadius:6,color:"#a0a8c0",padding:"4px 8px",fontSize:11,cursor:"pointer"}}>Cancel</button>
                    </div>
                  : <button onClick={()=>setConfirmDelete(w.id)} style={{background:"none",border:"none",color:"#5a6080",fontSize:18,cursor:"pointer",padding:"4px 6px",marginLeft:4}} title="Delete">×</button>

    // ─── Shoes Tab ────────────────────────────────────────────────────────────────
    function ShoesTab({ shoes, onSave }) {
      const [showAdd, setShowAdd] = useState(false);
      const [name, setName] = useState("");
      const [miles, setMiles] = useState("");
      const [makeActive, setMakeActive] = useState(true);
      const [adding, setAdding] = useState(null);
      const [addMiles, setAddMiles] = useState("");
      function getStatus(m) {
        if (m < 200) return { text: "Good condition", color: "#3b8a3a" };
        if (m < 350) return { text: "Monitor wear", color: "#c07820" };
        if (m < 450) return { text: "Getting worn", color: "#c05010" };
        return { text: "Replace soon!", color: "#c03020" };
      }
      return (
        <div className="section">
          <div className="section-header">
            <div className="section-title">Shoe Tracker</div>
            <button className="btn btn-secondary btn-sm" onClick={()=>setShowAdd(true)}>+ Add Shoe</button>
          </div>
          <div className="tip-card">Mark one shoe as <strong style={{color:"#40c070"}}>⭐ Active</strong> and every run — including Fitbit syncs — will automatically count toward its mileage. Running shoes typically last 300–500 miles.</div>
          {shoes.length===0 && <div className="empty-state"><div className="empty-icon">👟</div><div style={{fontWeight:600,marginBottom:6}}>No shoes added yet</div><div style={{fontSize:13}}>Add your running shoes to auto-track mileage.</div></div>}
          {shoes.map(shoe => {
            const status = getStatus(shoe.miles);
            const pct = Math.min(100, Math.round((shoe.miles/450)*100));
            const fillColor = pct<50?"#3b8a3a":pct<75?"#c07820":"#c03020";
            return (
              <div className="shoe-card" key={shoe.id} style={{border: shoe.active?"1px solid #2a5a2a":"1px solid #1e2030"}}>
                <div className="shoe-row">
                  <div>
                    <div className="shoe-name" style={{display:"flex",alignItems:"center",gap:6}}>
                      {shoe.name}
                      {shoe.active && <span style={{fontSize:10,background:"#0a2a1a",color:"#40c070",border:"1px solid #1a5a2a",borderRadius:10,padding:"1px 7px",fontWeight:700}}>⭐ ACTIVE</span>}
                    </div>
                    <div className="shoe-miles">{shoe.miles.toFixed(1)} <span style={{fontSize:14,fontWeight:400,color:"#a0a8c0"}}>miles</span></div>
                  </div>
                  <div style={{textAlign:"right"}}><div style={{fontSize:12,color:status.color,fontWeight:600}}>{status.text}</div><div style={{fontSize:11,color:"#5a6080",marginTop:3}}>{450-shoe.miles>0?`~${Math.round(450-shoe.miles)} mi left`:"Past recommended limit"}</div></div>
                </div>
                <div className="shoe-meter"><div className="shoe-fill" style={{width:`${pct}%`,background:fillColor}} /></div>
                <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap",alignItems:"center"}}>
                  {!shoe.active && <button className="miles-btn" style={{color:"#40c070",borderColor:"#1a5a2a"}} onClick={()=>onSave(shoes.map(s=>({...s,active:s.id===shoe.id})))}>⭐ Set Active</button>}
                  {adding===shoe.id
                    ? <>
                        <input className="input" style={{margin:0,flex:1,padding:"8px 12px",minWidth:60}} placeholder="Miles to add" type="number" value={addMiles} onChange={e=>setAddMiles(e.target.value)} />
                        <button className="btn btn-primary btn-sm" onClick={()=>{const m=parseFloat(addMiles);if(m>0)onSave(shoes.map(s=>s.id===shoe.id?{...s,miles:s.miles+m}:s));setAdding(null);setAddMiles("");}}>Add</button>
                        <button className="btn btn-secondary btn-sm" onClick={()=>{setAdding(null);setAddMiles("");}}>✕</button>
                      </>
                    : <>
                        {[3,5,6,8].map(m=><button key={m} className="miles-btn" onClick={()=>onSave(shoes.map(s=>s.id===shoe.id?{...s,miles:s.miles+m}:s))}>+{m}mi</button>)}
                        <button className="miles-btn" onClick={()=>setAdding(shoe.id)}>+other</button>
                      </>
                  }
                </div>
              </div>
            );
          })}
          {showAdd && (
            <div className="modal-overlay" onClick={e=>e.target.className==="modal-overlay"&&setShowAdd(false)}>
              <div className="modal">
                <div className="modal-title">Add Running Shoes</div>
                <div className="label">Shoe name / model</div>
                <input className="input" placeholder="e.g. Brooks Ghost 16" value={name} onChange={e=>setName(e.target.value)} />
                <div className="label">Current mileage (if already used)</div>
                <input className="input" placeholder="0" type="number" value={miles} onChange={e=>setMiles(e.target.value)} />
                <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",marginBottom:10,borderTop:"1px solid #1e2030",borderBottom:"1px solid #1e2030"}}>
                  <input type="checkbox" id="chkActive" checked={makeActive} onChange={e=>setMakeActive(e.target.checked)} style={{width:18,height:18,cursor:"pointer",accentColor:"#40c070"}} />
                  <label htmlFor="chkActive" style={{fontSize:14,color:"#f0ede8",cursor:"pointer"}}>Set as <strong>Active</strong> shoe — auto-tracks all runs</label>
                </div>
                <button className="btn btn-primary" onClick={()=>{
                  if (name.trim()) {
                    const newShoe = { id: Date.now(), name: name.trim(), miles: parseFloat(miles)||0, active: makeActive };
                    const updated = makeActive ? [...shoes.map(s=>({...s,active:false})), newShoe] : [...shoes, newShoe];
                    onSave(updated); setName(""); setMiles(""); setMakeActive(true); setShowAdd(false);
                  }
                }}>Add Shoes</button>
                <button className="btn btn-secondary" style={{marginTop:8}} onClick={()=>setShowAdd(false)}>Cancel</button>
              </div>
            </div>
          )}
        </div>
      );

                  <div style={{fontSize:13,fontWeight:600,color:"#f0ede8"}}>{r.name}</div>
                  <div style={{fontSize:11,color:"#5a6080"}}>{new Date(r.date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})} · {r.distance}</div>
                  {r.notes && <div style={{fontSize:11,color:"#a0a8c0"}}>{r.notes}</div>}
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:16,fontWeight:700,color:"#f07030"}}>{r.time}</div>
                  <button onClick={()=>onDeleteRace(r.id)} style={{background:"none",border:"none",color:"#5a6080",fontSize:16,cursor:"pointer",padding:"0 4px"}}>×</button>
